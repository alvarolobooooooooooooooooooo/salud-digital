/* ─────────── Helpers ─────────── */
const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTH_SHORT = ['ene.','feb.','mar.','abr.','may.','jun.','jul.','ago.','sep.','oct.','nov.','dic.'];
const DAY_LONG = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const DAY_SHORT_ES = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];

function fmtDt(dt) {
  const d = new Date(dt);
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  return `${MONTH_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${h}:${m}${ampm}`;
}
function fmtTime(dt) {
  const d = new Date(dt);
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  return `${h}:${m}${ampm}`;
}
function fmtTimeShort(dt) {
  const d = new Date(dt);
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,'0')}${ampm}`;
}
function fmtDateLongCap(d) {
  const s = d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function startOfMonday(d) { const x = startOfDay(d); const day = x.getDay(); const diff = day === 0 ? -6 : 1 - day; x.setDate(x.getDate() + diff); return x; }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function sameDay(a, b) { return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate(); }
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function nameInitials(name) { return String(name || '?').split(' ').filter(Boolean).slice(0,2).map(s => s[0]).join('').toUpperCase(); }

function aptDate(a) { return new Date(a.scheduled_at); }
function aptDuration(a) { return a.duration || 30; }

function drLabel(a) {
  const name = a.doctor_name && a.doctor_name.trim()
    ? `Dr. ${a.doctor_name}`
    : 'Dr. ' + (a.doctor_email || '').split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, l => l.toUpperCase());
  return name + (a.specialty ? ` · ${a.specialty}` : '');
}
function consultationPathForSpecialty(specialty) {
  if (specialty === 'Podología') return '/consultation-podiatry.html';
  if (specialty === 'Nutrición') return '/consultation-nutrition.html';
  return '/consultation.html';
}
function colorForSpecialty(specialty) {
  if (specialty === 'Odontología')     return 'var(--teal-600)';
  if (specialty === 'Medicina General')return 'var(--info-500)';
  if (specialty === 'Podología')       return 'var(--warn-500)';
  if (specialty === 'Nutrición')       return 'var(--ok-500)';
  return 'var(--ink-400)';
}
function dotForSpecialty(specialty) {
  return `<span style="width:7px;height:7px;border-radius:999px;background:${colorForSpecialty(specialty)};flex-shrink:0"></span>`;
}
function viewConsultationPathForSpecialty(specialty, id) {
  if (specialty === 'Podología') return `/view-consultation-podiatry.html?id=${id}`;
  if (specialty === 'Nutrición') return `/view-consultation.html?id=${id}&kind=nutrition`;
  return `/view-consultation.html?id=${id}`;
}

/* ─────────── Boot ─────────── */
async function refreshReminders() {
  try {
    const reminders = await api('/api/reminders');
    reminderMap = {};
    reminders.forEach(r => { reminderMap[r.appointment_id] = r; });
  } catch (e) { console.error('Error loading reminders:', e); }
}

(async () => {
  const pageLoader = document.getElementById('pageLoader');
  try {
    const [appts, patients, doctors, user, waCfg] = await Promise.all([
      api('/api/appointments'),
      api('/api/patients'),
      api('/api/users/doctors'),
      api('/api/auth/me'),
      api('/api/reminders/whatsapp-config').catch(() => null)
    ]);
    currentUser = user;
    allAppts   = appts;
    allDoctors = doctors;
    allPatients = patients;
    if (waCfg) waConfig = waCfg;
    await refreshReminders();

    // Modal patient + doctor selects
    const fd = document.getElementById('fPatient');
    patients.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.name; fd.appendChild(o); });
    const dd = document.getElementById('fDoctor');
    doctors.forEach(d => { const o = document.createElement('option'); o.value = d.id; o.textContent = `Dr. ${esc(d.name || d.email.split('@')[0])}`; dd.appendChild(o); });

    dd.addEventListener('change', (e) => {
      const doctorId = parseInt(e.target.value);
      const doctor = allDoctors.find(d => d.id === doctorId);
      const specialtyField = document.getElementById('fSpecialty');
      if (doctor && specialtyField) {
        specialtyField.value = doctor.specialty || 'Medicina General';
      } else if (specialtyField) {
        specialtyField.value = '';
      }
    });

    // Defaults: if there are appointments, jump to nearest week
    const upcoming = appts
      .filter(a => new Date(a.scheduled_at) >= startOfDay(new Date()))
      .sort((a,b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
    if (upcoming.length) calDate = new Date(upcoming[0].scheduled_at);

    initHeroSub();
    renderFilters();
    renderEverything();

    pageLoader.classList.add('hidden');
  } catch(e) {
    console.error(e);
    pageLoader.classList.add('hidden');
  }
})();

function initHeroSub() {
  const today = new Date();
  const fmt = today.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('heroSub').textContent = 'Gestiona citas, consultas y horarios — ' + fmt;
}

async function reloadAppointments() {
  try {
    const fresh = await api('/api/appointments');
    allAppts = fresh;
    await refreshReminders();
    renderEverything();
  } catch (e) { console.error(e); }
}

/* ─────────── Filtering ─────────── */
function applyFilterState(list) {
  let out = list;
  const q = filterState.q.trim().toLowerCase();
  if (q) {
    out = out.filter(a => {
      const blob = [a.patient_name, a.doctor_name, a.specialty, a.notes].filter(Boolean).join(' ').toLowerCase();
      return blob.includes(q);
    });
  }
  if (filterState.status.length)  out = out.filter(a => filterState.status.includes(a.status || 'pending'));
  if (filterState.type.length)    out = out.filter(a => filterState.type.includes(a.specialty || 'Medicina General'));
  if (filterState.doctor.length)  out = out.filter(a => filterState.doctor.includes(a.doctor_id));
  if (filterState.patient.length) out = out.filter(a => filterState.patient.includes(a.patient_id));

  if (filterState.dateRange !== 'all') {
    const today = startOfDay(new Date());
    let from = today, to = addDays(today, 1);
    if (filterState.dateRange === 'tomorrow')  { from = addDays(today, 1); to = addDays(today, 2); }
    else if (filterState.dateRange === 'week') { from = startOfMonday(today); to = addDays(from, 7); }
    else if (filterState.dateRange === 'nextweek') { from = addDays(startOfMonday(today), 7); to = addDays(from, 7); }
    else if (filterState.dateRange === 'month') { from = new Date(today.getFullYear(), today.getMonth(), 1); to = new Date(today.getFullYear(), today.getMonth()+1, 1); }
    else if (filterState.dateRange === 'nextmonth') { from = new Date(today.getFullYear(), today.getMonth()+1, 1); to = new Date(today.getFullYear(), today.getMonth()+2, 1); }
    else if (filterState.dateRange === '30')   { from = addDays(today, -30); to = addDays(today, 1); }
    out = out.filter(a => { const d = aptDate(a); return d >= from && d < to; });
  }
  return out;
}

function activeFilterCount() {
  return (filterState.status.length || 0)
    + (filterState.type.length || 0)
    + (filterState.doctor.length || 0)
    + (filterState.patient.length || 0)
    + (filterState.dateRange !== 'all' ? 1 : 0)
    + (filterState.q ? 1 : 0);
}

function clearAllFilters() {
  filterState = { q:'', dateRange:'all', status:[], type:[], doctor:[], patient:[] };
  document.getElementById('searchInput').value = '';
  renderFilters();
  renderEverything();
}

function onSearchChange() {
  filterState.q = document.getElementById('searchInput').value;
  renderEverything();
}

/* ─────────── Filter bar render ─────────── */
function toggleFilterPanel(force) {
  const panel = document.getElementById('filterPanel');
  const toggle = document.getElementById('filterToggle');
  if (!panel || !toggle) return;
  const inner = panel.querySelector('.filter-panel-inner');
  const willOpen = typeof force === 'boolean' ? force : !panel.classList.contains('open');

  // Closing: clip immediately so animation looks smooth
  if (!willOpen && inner) inner.style.overflow = 'hidden';

  panel.classList.toggle('open', willOpen);
  toggle.classList.toggle('open', willOpen);
  toggle.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  panel.setAttribute('aria-hidden', willOpen ? 'false' : 'true');

  // Opening: after the height animation completes, allow popovers to spill out
  if (willOpen && inner) {
    clearTimeout(panel._ovTimer);
    panel._ovTimer = setTimeout(() => {
      if (panel.classList.contains('open')) inner.style.overflow = 'visible';
    }, 340);
  }
}

function renderFilters() {
  const row = document.getElementById('filterRow');
  row.innerHTML = '';

  // Update toggle button state
  const toggle = document.getElementById('filterToggle');
  const countEl = document.getElementById('filterToggleCount');
  const totalActive = activeFilterCount();
  if (toggle) toggle.classList.toggle('has-active', totalActive > 0);
  if (countEl) {
    if (totalActive > 0) { countEl.hidden = false; countEl.textContent = totalActive; }
    else { countEl.hidden = true; }
  }

  // Specialty awareness for "Tipo de cita" icon
  const specialty = currentUser && currentUser.specialty;
  let typeIcon = SVG.tooth;
  if (specialty === 'Nutrición') {
    typeIcon = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>';
  } else if (specialty === 'Podología') {
    typeIcon = SVG.stethoscope;
  }

  // Date range
  const dateRangeLabels = {
    today:'Hoy', tomorrow:'Mañana', week:'Esta semana', nextweek:'Próxima semana',
    month:'Este mes', nextmonth:'Próximo mes', '30':'Últimos 30 días', all:'Todas las fechas'
  };
  row.appendChild(buildDropdownTrigger({
    id: 'date',
    icon: SVG.calendar,
    label: dateRangeLabels[filterState.dateRange],
    active: filterState.dateRange !== 'all',
    count: 0,
  }));

  // Compute counts from full appts list
  const apptsForCounts = allAppts;

  // Status
  const statusOpts = ['pending','waiting','completed','cancelled'].map(s => ({
    value: s,
    label: STATUS_META[s].label,
    dot: ({pending:'#f59e0b', waiting:'#3b82f6', completed:'#10b981', cancelled:'#ef4444'})[s],
    count: apptsForCounts.filter(a => (a.status||'pending') === s).length,
  }));
  row.appendChild(buildDropdownTrigger({
    id: 'status',
    icon: SVG.flag,
    label: 'Estado',
    active: filterState.status.length > 0,
    count: filterState.status.length,
  }));

  // Type (specialty)
  const typeSet = new Set();
  apptsForCounts.forEach(a => typeSet.add(a.specialty || 'Medicina General'));
  const typeOpts = Array.from(typeSet).map(t => ({
    value: t, label: t, count: apptsForCounts.filter(a => (a.specialty||'Medicina General') === t).length,
  })).sort((a,b) => b.count - a.count);
  if (typeOpts.length > 1) {
    row.appendChild(buildDropdownTrigger({
      id: 'type',
      icon: typeIcon,
      label: 'Especialidad',
      active: filterState.type.length > 0,
      count: filterState.type.length,
    }));
  }

  // Doctor
  if (allDoctors.length > 1) {
    row.appendChild(buildDropdownTrigger({
      id: 'doctor',
      icon: SVG.stethoscope,
      label: 'Doctor',
      active: filterState.doctor.length > 0,
      count: filterState.doctor.length,
    }));
  }

  // Patient
  row.appendChild(buildDropdownTrigger({
    id: 'patient',
    icon: SVG.user,
    label: 'Paciente',
    active: filterState.patient.length > 0,
    count: filterState.patient.length,
  }));

  // Clear button
  if (activeFilterCount() > 0) {
    const clr = document.createElement('button');
    clr.className = 'filter-clear-all';
    clr.innerHTML = `${SVG.close} Limpiar filtros (${activeFilterCount()})`;
    clr.onclick = clearAllFilters;
    row.appendChild(clr);
  }

  // Stash options for dropdowns
  filterRowMeta = { statusOpts, typeOpts, dateRangeLabels };
}

let filterRowMeta = { statusOpts: [], typeOpts: [], dateRangeLabels: {} };

function buildDropdownTrigger({ id, icon, label, active, count }) {
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  const btn = document.createElement('button');
  btn.className = 'ms-trigger' + (active ? ' active' : '');
  btn.dataset.msId = id;
  btn.innerHTML = `<span class="ms-icon">${icon}</span><span>${esc(label)}</span>${count > 0 ? `<span class="ms-count">${count}</span>` : ''}<span class="ms-chev">${SVG.chevD}</span>`;
  btn.onclick = (e) => { e.stopPropagation(); toggleDropdown(id, wrap); };
  wrap.appendChild(btn);
  return wrap;
}

function closeDropdown() {
  if (!activeMs) return;
  const old = document.querySelector('.ms-pop');
  if (old) old.remove();
  document.querySelectorAll('.ms-trigger').forEach(b => b.dataset.open = '');
  activeMs = null;
}

function toggleDropdown(id, anchor) {
  if (activeMs === id) { closeDropdown(); return; }
  closeDropdown();
  activeMs = id;
  const trigger = anchor.querySelector('.ms-trigger');
  trigger.dataset.open = 'true';

  const pop = document.createElement('div');
  pop.className = 'ms-pop';
  pop.onclick = (e) => e.stopPropagation();
  anchor.appendChild(pop);

  if (id === 'date') renderDatePop(pop);
  else if (id === 'status') renderMsPop(pop, filterRowMeta.statusOpts, filterState.status, (sel) => { filterState.status = sel; renderFilters(); renderEverything(); });
  else if (id === 'type') renderMsPop(pop, filterRowMeta.typeOpts, filterState.type, (sel) => { filterState.type = sel; renderFilters(); renderEverything(); });
  else if (id === 'doctor') {
    const docOpts = allDoctors.map(d => ({
      value: d.id,
      label: d.name ? `Dr. ${d.name}` : `Dr. ${(d.email||'').split('@')[0]}`,
      count: allAppts.filter(a => a.doctor_id === d.id).length,
    }));
    renderMsPop(pop, docOpts, filterState.doctor, (sel) => { filterState.doctor = sel; renderFilters(); renderEverything(); });
  }
  else if (id === 'patient') {
    const patOpts = allPatients.map(p => ({
      value: p.id,
      label: p.name,
      count: allAppts.filter(a => a.patient_id === p.id).length,
    })).sort((a,b) => a.label.localeCompare(b.label));
    renderMsPop(pop, patOpts, filterState.patient, (sel) => { filterState.patient = sel; renderFilters(); renderEverything(); }, true);
  }
}

function renderDatePop(pop) {
  const presets = [
    { v:'today', label:'Hoy' },
    { v:'tomorrow', label:'Mañana' },
    { v:'week', label:'Esta semana' },
    { v:'nextweek', label:'Próxima semana' },
    { v:'month', label:'Este mes' },
    { v:'nextmonth', label:'Próximo mes' },
    { v:'30', label:'Últimos 30 días' },
    { v:'all', label:'Todas las fechas' },
  ];
  pop.style.minWidth = '220px';
  pop.style.padding = '4px';
  presets.forEach(p => {
    const b = document.createElement('button');
    const active = filterState.dateRange === p.v;
    b.className = 'ms-opt' + (active ? ' active' : '');
    b.style.fontWeight = active ? '600' : '450';
    if (active) b.style.color = 'var(--teal-700)';
    b.innerHTML = `<span class="ms-opt-label">${esc(p.label)}</span>`;
    b.onclick = () => { filterState.dateRange = p.v; closeDropdown(); renderFilters(); renderEverything(); };
    pop.appendChild(b);
  });
}

function renderMsPop(pop, options, selected, onChange, searchable) {
  let q = '';
  function rerender() {
    pop.innerHTML = '';
    if (searchable) {
      const wrap = document.createElement('div');
      wrap.className = 'ms-search';
      wrap.innerHTML = `<div class="ms-search-inner">${SVG.search}<input type="text" placeholder="Buscar..." autofocus></div>`;
      const inp = wrap.querySelector('input');
      inp.value = q;
      inp.oninput = (e) => { q = e.target.value; rerender(); inp.focus(); };
      pop.appendChild(wrap);
    }
    const filtered = options.filter(o => !q || o.label.toLowerCase().includes(q.toLowerCase()));
    filtered.forEach(opt => {
      const active = selected.includes(opt.value);
      const b = document.createElement('button');
      b.className = 'ms-opt' + (active ? ' active' : '');
      b.innerHTML = `
        <span class="ms-checkbox">${active ? SVG.check : ''}</span>
        ${opt.dot ? `<span class="ms-opt-dot" style="background:${opt.dot}"></span>` : ''}
        <span class="ms-opt-label">${esc(opt.label)}</span>
        ${opt.count != null ? `<span class="ms-opt-count">${opt.count}</span>` : ''}
      `;
      b.onclick = () => {
        const next = active ? selected.filter(s => s !== opt.value) : [...selected, opt.value];
        selected = next;
        onChange(next);
      };
      pop.appendChild(b);
    });
    if (selected.length > 0) {
      const div = document.createElement('div'); div.className = 'ms-divider'; pop.appendChild(div);
      const b = document.createElement('button');
      b.className = 'ms-clear';
      b.textContent = 'Limpiar selección';
      b.onclick = () => { selected = []; onChange([]); };
      pop.appendChild(b);
    }
  }
  rerender();
}

document.addEventListener('mousedown', (e) => {
  if (!activeMs) return;
  if (!e.target.closest('.ms-pop') && !e.target.closest('.ms-trigger')) closeDropdown();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeDropdown(); closeDrawer(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

/* ─────────── KPIs ─────────── */
function renderKpis() {
  const today = startOfDay(new Date());
  const wsMon = startOfMonday(today);
  const we = addDays(wsMon, 7);
  const mStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const mEnd = new Date(today.getFullYear(), today.getMonth()+1, 1);
  const lastMStart = new Date(today.getFullYear(), today.getMonth()-1, 1);

  const todayApts = allAppts.filter(a => sameDay(aptDate(a), today));
  const weekApts = allAppts.filter(a => { const d = aptDate(a); return d >= wsMon && d < we; });
  const monthApts = allAppts.filter(a => { const d = aptDate(a); return d >= mStart && d < mEnd; });
  const lastMonth = allAppts.filter(a => { const d = aptDate(a); return d >= lastMStart && d < mStart; });

  const pending = monthApts.filter(a => (a.status||'pending') === 'pending').length;
  const completed = monthApts.filter(a => a.status === 'completed').length;
  const cancelled = monthApts.filter(a => a.status === 'cancelled').length;
  const todayConfirmed = todayApts.filter(a => a.status === 'waiting' || a.status === 'completed').length;
  const todayPending = todayApts.filter(a => (a.status||'pending') === 'pending').length;
  const attendanceTotal = completed + cancelled;
  const attendanceRate = attendanceTotal > 0 ? Math.round((completed / attendanceTotal) * 100) : 0;

  function deltaPct(curr, prev) {
    if (!prev) return null;
    const pct = Math.round(((curr - prev) / prev) * 100);
    if (pct === 0) return null;
    return { val: (pct > 0 ? '+' : '') + pct + '%', dir: pct > 0 ? 'up' : 'down' };
  }
  const monthDelta = deltaPct(monthApts.length, lastMonth.length);

  const kpis = [
    {
      label: 'Hoy', value: todayApts.length,
      hint: `${todayConfirmed} confirmadas · ${todayPending} pendientes`,
      icon: SVG.calendar, accent: 'rgba(6,182,212,.18)'
    },
    {
      label: 'Esta semana', value: weekApts.length,
      hint: 'Lun – Dom',
      icon: SVG.timeline, accent: 'rgba(6,182,212,.18)'
    },
    {
      label: 'Este mes', value: monthApts.length,
      delta: monthDelta,
      hint: `${completed} atendidas · ${pending} pendientes`,
      icon: SVG.bolt, accent: 'rgba(6,182,212,.18)'
    },
    {
      label: 'Por confirmar', value: pending,
      hint: 'Requieren seguimiento',
      icon: SVG.warn, accent: 'rgba(6,182,212,.18)'
    },
    {
      label: 'Tasa de asistencia', value: `${attendanceRate}%`,
      hint: `${cancelled} canceladas / no asistidas`,
      icon: SVG.check, accent: 'rgba(6,182,212,.18)'
    },
  ];

  const html = kpis.map(k => `
    <div class="kpi-card glass" style="--kpi-accent:${k.accent}">
      <div class="kpi-head">
        <span class="kpi-label">${k.label}</span>
        <span class="kpi-icon">${k.icon}</span>
      </div>
      <div class="kpi-value-row">
        <span class="kpi-value">${k.value}</span>
        ${k.delta ? `<span class="kpi-delta ${k.delta.dir}">${k.delta.val}</span>` : ''}
      </div>
      ${k.hint ? `<div class="kpi-hint">${esc(k.hint)}</div>` : ''}
    </div>
  `).join('');
  document.getElementById('kpiStrip').innerHTML = html;
  updateKpiCarousel();
}

/* ─────────── KPI carousel ─────────── */
function updateKpiCarousel() {
  const strip = document.getElementById('kpiStrip');
  if (!strip) return;
  const prevBtn = document.querySelector('.kpi-nav-prev');
  const nextBtn = document.querySelector('.kpi-nav-next');
  const edgeL = document.querySelector('.kpi-edge-left');
  const edgeR = document.querySelector('.kpi-edge-right');
  const dotsEl = document.getElementById('kpiDots');
  const overflow = strip.scrollWidth > strip.clientWidth + 1;
  const atStart = strip.scrollLeft <= 2;
  const atEnd = strip.scrollLeft >= strip.scrollWidth - strip.clientWidth - 2;
  if (prevBtn) prevBtn.classList.toggle('show', overflow && !atStart);
  if (nextBtn) nextBtn.classList.toggle('show', overflow && !atEnd);
  if (edgeL) edgeL.classList.toggle('show', overflow && !atStart);
  if (edgeR) edgeR.classList.toggle('show', overflow && !atEnd);
  if (dotsEl) {
    if (overflow) {
      const cards = strip.querySelectorAll('.kpi-card');
      const total = cards.length;
      if (total > 1) {
        let activeIdx;
        if (atEnd) {
          activeIdx = total - 1;
        } else {
          let bestDist = Infinity;
          activeIdx = 0;
          cards.forEach((c, i) => {
            const dist = Math.abs(c.offsetLeft - strip.scrollLeft);
            if (dist < bestDist) { bestDist = dist; activeIdx = i; }
          });
        }
        let dotsHtml = '';
        for (let i = 0; i < total; i++) {
          dotsHtml += `<button class="kpi-dot ${i === activeIdx ? 'active' : ''}" type="button" onclick="kpiGoTo(${i})" aria-label="Tarjeta ${i+1}"></button>`;
        }
        dotsEl.innerHTML = dotsHtml;
        dotsEl.classList.add('show');
      } else {
        dotsEl.classList.remove('show');
        dotsEl.innerHTML = '';
      }
    } else {
      dotsEl.classList.remove('show');
      dotsEl.innerHTML = '';
    }
  }
}
function kpiScroll(dir) {
  const strip = document.getElementById('kpiStrip');
  if (!strip) return;
  const cards = strip.querySelectorAll('.kpi-card');
  if (!cards.length) return;
  const maxLeft = strip.scrollWidth - strip.clientWidth;
  const atEnd = strip.scrollLeft >= maxLeft - 2;
  let targetIdx;
  if (dir > 0) {
    targetIdx = cards.length - 1;
    for (let i = 0; i < cards.length; i++) {
      if (cards[i].offsetLeft > strip.scrollLeft + 2) { targetIdx = i; break; }
    }
  } else {
    targetIdx = 0;
    for (let i = cards.length - 1; i >= 0; i--) {
      if (cards[i].offsetLeft < strip.scrollLeft - 2) { targetIdx = i; break; }
    }
  }
  kpiGoTo(targetIdx);
}
function kpiGoTo(idx) {
  const strip = document.getElementById('kpiStrip');
  if (!strip) return;
  const cards = strip.querySelectorAll('.kpi-card');
  const card = cards[idx];
  if (!card) return;
  const maxLeft = strip.scrollWidth - strip.clientWidth;
  const targetLeft = Math.min(card.offsetLeft, maxLeft);
  strip.scrollTo({ left: targetLeft, behavior: 'smooth' });
}
(function initKpiCarouselListeners() {
  const onReady = () => {
    const strip = document.getElementById('kpiStrip');
    if (!strip) return;
    strip.addEventListener('scroll', () => updateKpiCarousel(), { passive: true });
    window.addEventListener('resize', updateKpiCarousel);
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', onReady);
  } else {
    onReady();
  }
})();

/* ─────────── View toolbar / nav ─────────── */
function setView(v) {
  calView = v;
  document.querySelectorAll('#viewSwitcher .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.v === v));
  renderEverything();
}
function calPrev() {
  const d = new Date(calDate);
  if (calView === 'day')  d.setDate(d.getDate() - 1);
  if (calView === 'week') d.setDate(d.getDate() - 7);
  if (calView === 'month') d.setMonth(d.getMonth() - 1);
  calDate = d; renderEverything();
}
function calNext() {
  const d = new Date(calDate);
  if (calView === 'day')  d.setDate(d.getDate() + 1);
  if (calView === 'week') d.setDate(d.getDate() + 7);
  if (calView === 'month') d.setMonth(d.getMonth() + 1);
  calDate = d; renderEverything();
}
function calToday() { calDate = new Date(); weekActiveDayIdx = null; renderEverything(); }

function updateDateLabel(filteredCount) {
  const lbl = document.getElementById('dateLabel');
  const navCluster = document.getElementById('navCluster');
  if (calView === 'list' || calView === 'kanban') {
    navCluster.style.visibility = 'hidden';
    lbl.innerHTML = `Mostrando <strong style="color:var(--ink-900);font-weight:700;">${filteredCount}</strong> de ${allAppts.length} citas`;
    lbl.style.fontSize = '14px';
    lbl.style.fontWeight = '500';
    lbl.style.color = 'var(--ink-600)';
    return;
  }
  navCluster.style.visibility = 'visible';
  lbl.style.fontSize = '17px';
  lbl.style.fontWeight = '700';
  lbl.style.color = 'var(--ink-900)';
  if (calView === 'day') {
    lbl.textContent = fmtDateLongCap(calDate);
  } else if (calView === 'week') {
    const m = startOfMonday(calDate);
    const s = addDays(m, 6);
    lbl.textContent = `${m.getDate()} ${MONTH_SHORT[m.getMonth()]} – ${s.getDate()} ${MONTH_SHORT[s.getMonth()]} ${s.getFullYear()}`;
  } else if (calView === 'month') {
    lbl.textContent = `${MONTH_NAMES[calDate.getMonth()]} ${calDate.getFullYear()}`;
  }
}

/* ─────────── Master render ─────────── */
function renderEverything() {
  renderKpis();
  const filtered = applyFilterState(allAppts);
  updateDateLabel(filtered.length);
  const body = document.getElementById('viewBody');
  body.classList.remove('fade-in');
  void body.offsetWidth; // restart animation
  body.classList.add('fade-in');
  if (calView === 'day')    body.innerHTML = renderDayView(filtered);
  else if (calView === 'week')   body.innerHTML = renderWeekView(filtered);
  else if (calView === 'month')  body.innerHTML = renderMonthView(filtered);
  else if (calView === 'list')   body.innerHTML = renderListView(filtered);
  else if (calView === 'kanban') body.innerHTML = renderKanbanView(filtered);
  attachAptClickHandlers();
}

function attachAptClickHandlers() {
  document.querySelectorAll('[data-apt-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(el.dataset.aptId);
      openDrawer(id);
    });
  });
  document.querySelectorAll('[data-month-day]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.month-apt')) return;
      const ds = el.dataset.monthDay;
      calDate = new Date(ds + 'T00:00:00');
      setView('day');
    });
  });
  document.querySelectorAll('.day-pill[data-day-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.dayIdx);
      weekActiveDayIdx = idx;
      document.querySelectorAll('.day-pill[data-day-idx]').forEach(p =>
        p.classList.toggle('active', parseInt(p.dataset.dayIdx) === idx));
      document.querySelectorAll('.week-day-col[data-day-idx]').forEach(c =>
        c.classList.toggle('is-active', parseInt(c.dataset.dayIdx) === idx));
    });
  });
}

/* ─────────── Day view ─────────── */
function renderDayView(filtered) {
  const hourPx = 64;
  const dayApts = filtered.filter(a => sameDay(aptDate(a), calDate)).sort((a,b) => aptDate(a) - aptDate(b));
  // Default window 7am–7pm, but expand if any appt falls outside so it's always visible.
  let startHr = 7, endHr = 19;
  dayApts.forEach(a => {
    const d = aptDate(a);
    const startH = d.getHours() + d.getMinutes() / 60;
    const endH = startH + aptDuration(a) / 60;
    if (startH < startHr) startHr = Math.floor(startH);
    if (endH > endHr) endHr = Math.ceil(endH);
  });
  startHr = Math.max(0, startHr);
  endHr = Math.min(24, endHr);
  const totalHeight = (endHr - startHr) * hourPx;

  // collision layout
  const positioned = layoutColumns(dayApts);

  const today = new Date();
  const isToday = sameDay(today, calDate);
  let nowHtml = '';
  if (isToday) {
    const nowMin = today.getHours() * 60 + today.getMinutes();
    const nowOff = ((nowMin/60) - startHr) * hourPx;
    if (nowOff >= 0 && nowOff <= totalHeight) {
      let h = today.getHours(), m = String(today.getMinutes()).padStart(2,'0');
      const ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
      nowHtml = `
        <div class="day-now" style="top:${nowOff}px">
          <div class="day-now-line"></div>
          <div class="day-now-dot"></div>
          <div class="day-now-time">${h}:${m}${ampm}</div>
        </div>`;
    }
  }

  const totalDur = dayApts.reduce((s, a) => s + aptDuration(a), 0);
  const counts = ['pending','waiting','completed','cancelled'].map(k => ({
    k, n: dayApts.filter(a => (a.status||'pending') === k).length
  })).filter(x => x.n > 0);
  const dotColors = { pending:'var(--warn-500)', waiting:'var(--info-500)', completed:'var(--ok-500)', cancelled:'var(--bad-500)' };

  const hours = [];
  for (let i = 0; i < endHr - startHr; i++) {
    const h = startHr + i;
    const h12 = h % 12 || 12;
    const ampm = h < 12 ? 'am' : 'pm';
    hours.push(`<div class="day-hour"><div class="day-hour-label">${h12}:00 ${ampm}</div></div>`);
  }
  const lines = [];
  for (let i = 0; i <= endHr - startHr; i++) {
    lines.push(`<div class="day-line" style="top:${i * hourPx}px"></div>`);
    if (i < endHr - startHr) lines.push(`<div class="day-line-half" style="top:${i * hourPx + hourPx/2}px"></div>`);
  }

  const blocks = positioned.map(({ apt, colIdx, total }) => {
    const d = aptDate(apt);
    const minFromStart = (d.getHours() * 60 + d.getMinutes()) - startHr * 60;
    const top = (minFromStart / 60) * hourPx;
    const dur = aptDuration(apt);
    const height = Math.max(28, (dur / 60) * hourPx - 2);
    const cls = statusOf(apt.status).cls;
    const colW = `calc((100% - 16px) / ${total})`;
    const left = `calc(8px + ${colIdx} * ((100% - 16px) / ${total}) + ${colIdx * 4}px)`;
    return `
      <div class="apt-block ${cls}" data-apt-id="${apt.id}" style="top:${top}px;left:${left};width:${colW};height:${height}px">
        <div class="apt-time">${fmtTime(apt.scheduled_at)}<span class="apt-time-dur">· ${dur}min</span></div>
        <div class="apt-name">${esc(apt.patient_name || '?')}</div>
        ${height > 50 ? `<div class="apt-meta"><span class="dot" style="background:var(--teal-600)"></span>${esc(apt.specialty || 'Consulta')}</div>` : ''}
      </div>`;
  }).join('');

  const dayName = calDate.toLocaleDateString('es-ES', { weekday: 'long' });
  const dateStrLong = calDate.toLocaleDateString('es-ES', { day:'numeric', month:'long', year:'numeric' });
  return `
    <div class="day-view glass-strong">
      <div class="day-head">
        <div>
          <div class="day-head-name">${dayName}</div>
          <div class="day-head-date">${dateStrLong}</div>
        </div>
        <div class="day-head-meta">
          <div class="day-head-stat">${SVG.clock}<span>${dayApts.length} citas · ${totalDur} min total</span></div>
          <div class="day-head-counts">${counts.map(c => `<span class="day-head-count"><span class="dot" style="background:${dotColors[c.k]}"></span>${c.n}</span>`).join('')}</div>
        </div>
      </div>
      <div class="day-grid">
        <div class="day-hours-col">${hours.join('')}</div>
        <div class="day-canvas" style="min-height:${totalHeight}px">
          ${lines.join('')}
          ${nowHtml}
          ${blocks}
        </div>
      </div>
    </div>`;
}

function layoutColumns(sorted) {
  // Greedy column assignment for overlapping appts
  const columns = [];
  const placed = sorted.map(a => {
    const start = aptDate(a).getTime();
    const end = start + aptDuration(a) * 60000;
    let colIdx = -1;
    for (let i = 0; i < columns.length; i++) {
      if (columns[i] <= start) { columns[i] = end; colIdx = i; break; }
    }
    if (colIdx === -1) { columns.push(end); colIdx = columns.length - 1; }
    return { apt: a, start, end, colIdx };
  });
  // Compute total columns per overlapping group
  return placed.map(p => {
    let total = 1;
    for (const q of placed) {
      if (q === p) continue;
      if (q.start < p.end && q.end > p.start) total = Math.max(total, q.colIdx + 1);
    }
    total = Math.max(total, p.colIdx + 1);
    return { apt: p.apt, colIdx: p.colIdx, total };
  });
}

/* ─────────── Week view ─────────── */
function renderWeekView(filtered) {
  const ws = startOfMonday(calDate);
  const days = Array.from({length:7}, (_,i) => addDays(ws, i));
  const hourPx = 60;
  const today = new Date();
  // Default window 7am–7pm, but expand to cover any out-of-range appts in this week.
  const weekEnd = addDays(ws, 7);
  const weekApts = filtered.filter(a => { const d = aptDate(a); return d >= ws && d < weekEnd; });
  let startHr = 7, endHr = 19;
  weekApts.forEach(a => {
    const d = aptDate(a);
    const startH = d.getHours() + d.getMinutes() / 60;
    const endH = startH + aptDuration(a) / 60;
    if (startH < startHr) startHr = Math.floor(startH);
    if (endH > endHr) endHr = Math.ceil(endH);
  });
  startHr = Math.max(0, startHr);
  endHr = Math.min(24, endHr);
  const totalHeight = (endHr - startHr) * hourPx;

  // Mobile: pick which day is shown in the single-column timeline.
  // Auto-pick today if it's in this week, otherwise Monday. Lock the choice in
  // so navigating weeks keeps the same weekday selected.
  let activeIdx = weekActiveDayIdx;
  if (activeIdx == null || activeIdx < 0 || activeIdx > 6) {
    const todayIdx = days.findIndex(d => sameDay(d, today));
    activeIdx = todayIdx >= 0 ? todayIdx : 0;
  }
  weekActiveDayIdx = activeIdx;

  const dayData = days.map((d, i) => ({
    d, i,
    isT: sameDay(d, today),
    dayApts: filtered.filter(a => sameDay(aptDate(a), d)),
  }));

  const headCells = dayData.map(({ d, isT, dayApts }) => `
    <div class="week-head-cell${isT ? ' today' : ''}">
      <div class="wh-name${isT ? ' today' : ''}">${DAY_SHORT_ES[d.getDay()]}</div>
      <div class="wh-num-row">
        <span class="wh-num${isT ? ' today' : ''}">${d.getDate()}</span>
        ${dayApts.length ? `<span class="wh-count">${dayApts.length} cita${dayApts.length===1?'':'s'}</span>` : ''}
      </div>
    </div>`).join('');

  const dayStrip = dayData.map(({ d, i, isT, dayApts }) => `
    <button type="button" class="day-pill${isT ? ' today' : ''}${i === activeIdx ? ' active' : ''}" data-day-idx="${i}" aria-label="${DAY_SHORT_ES[d.getDay()]} ${d.getDate()}, ${dayApts.length} cita${dayApts.length===1?'':'s'}">
      <span class="dp-name">${DAY_SHORT_ES[d.getDay()]}</span>
      <span class="dp-num">${d.getDate()}</span>
      ${dayApts.length ? `<span class="dp-dot"></span>` : ''}
    </button>`).join('');

  const hourLabels = [];
  for (let i = 0; i < endHr - startHr; i++) {
    const h = startHr + i;
    const h12 = h % 12 || 12;
    const ampm = h < 12 ? 'a' : 'p';
    hourLabels.push(`<div class="week-hour"><div class="week-hour-label">${h12}${ampm}</div></div>`);
  }

  const dayCols = dayData.map(({ isT, dayApts, i }) => {
    const lines = [];
    for (let j = 0; j <= endHr - startHr; j++) lines.push(`<div class="week-line" style="top:${j*hourPx}px"></div>`);
    const sorted = dayApts.slice().sort((a,b) => aptDate(a) - aptDate(b));
    const positioned = layoutColumns(sorted);
    const apts = positioned.map(({ apt: a, colIdx, total }) => {
      const dt = aptDate(a);
      const minFromStart = (dt.getHours() * 60 + dt.getMinutes()) - startHr * 60;
      const top = (minFromStart / 60) * hourPx;
      const dur = aptDuration(a);
      const height = Math.max(24, (dur / 60) * hourPx - 2);
      const cls = statusOf(a.status).cls;
      const first = (a.patient_name || '').split(' ')[0] || '';
      const lastInit = ((a.patient_name || '').split(' ')[1] || '')[0] || '';
      const colW = `calc((100% - 6px) / ${total})`;
      const left = `calc(3px + ${colIdx} * ((100% - 6px) / ${total}))`;
      return `
        <div class="apt-block ${cls} week-apt" data-apt-id="${a.id}" style="top:${top}px;height:${height}px;left:${left};width:${colW};right:auto">
          <div class="week-apt-time">${fmtTimeShort(a.scheduled_at)}</div>
          <div class="week-apt-name">${esc(first)}${lastInit ? ' ' + esc(lastInit) + '.' : ''}</div>
        </div>`;
    }).join('');
    return `<div class="week-day-col${isT ? ' today' : ''}${i === activeIdx ? ' is-active' : ''}" data-day-idx="${i}" style="--week-h:${totalHeight}px">${lines.join('')}${apts}</div>`;
  }).join('');

  return `
    <div class="week-view glass-strong">
      <div class="week-day-strip">${dayStrip}</div>
      <div class="week-head">
        <div class="week-head-spacer"></div>
        ${headCells}
      </div>
      <div class="week-grid" style="--week-h:${totalHeight}px">
        <div class="week-hours-col">${hourLabels.join('')}</div>
        ${dayCols}
      </div>
    </div>`;
}

/* ─────────── Month view ─────────── */
function renderMonthView(filtered) {
  const y = calDate.getFullYear();
  const m = calDate.getMonth();
  const first = new Date(y, m, 1);
  const last = new Date(y, m+1, 0);
  const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  const totalDays = last.getDate();
  const totalCells = Math.ceil((startDay + totalDays) / 7) * 7;
  const today = new Date();

  const headCells = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM']
    .map(w => `<div class="month-head-cell">${w}</div>`).join('');

  const cells = [];
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startDay + 1;
    const cellDate = new Date(y, m, dayNum);
    const inMonth = dayNum >= 1 && dayNum <= totalDays;
    const isT = sameDay(cellDate, today);
    const dayApts = inMonth ? filtered.filter(a => sameDay(aptDate(a), cellDate)).sort((a,b) => aptDate(a) - aptDate(b)) : [];
    const overflow = dayApts.length > 3 ? `<span class="month-overflow">+${dayApts.length - 3}</span>` : '';
    const items = dayApts.slice(0, 3).map(a => {
      const cls = statusOf(a.status).cls;
      const first = (a.patient_name || '').split(' ')[0] || '';
      const lastInit = ((a.patient_name || '').split(' ')[1] || '')[0] || '';
      return `<div class="month-apt ${cls}" data-apt-id="${a.id}"><span class="month-apt-time">${fmtTimeShort(a.scheduled_at)}</span><span>${esc(first)}${lastInit ? ' ' + esc(lastInit) + '.' : ''}</span></div>`;
    }).join('');
    cells.push(`
      <div class="month-cell${!inMonth ? ' out-of-month' : ''}${isT ? ' today' : ''}" ${inMonth ? `data-month-day="${dateStr(cellDate)}"` : ''}>
        <div class="month-day-row">
          <span class="month-day-num${isT ? ' today' : ''}${!inMonth ? ' out' : ''}">${cellDate.getDate()}</span>
          ${overflow}
        </div>
        <div class="month-apts">${items}</div>
      </div>`);
  }

  return `
    <div class="month-view glass-strong">
      <div class="month-head">${headCells}</div>
      <div class="month-grid">${cells.join('')}</div>
    </div>`;
}

/* ─────────── List view ─────────── */
function renderListView(filtered) {
  if (!filtered.length) {
    return `
      <div class="empty-card">
        <div class="empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg></div>
        <div class="empty-title">No hay citas que coincidan con los filtros</div>
        <div class="empty-sub">Prueba ajustando los criterios de búsqueda</div>
      </div>`;
  }
  // Group by day
  const groups = new Map();
  filtered.slice().sort((a,b) => aptDate(a) - aptDate(b)).forEach(a => {
    const key = dateStr(aptDate(a));
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(a);
  });
  const today = new Date();
  return `
    <div class="list-view">
      ${[...groups.entries()].map(([key, apts]) => {
        const d = new Date(key + 'T00:00:00');
        const isT = sameDay(d, today);
        const pillTxt = (isT ? 'Hoy · ' : '') + d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
        return `
          <div>
            <div class="list-day-head">
              <span class="list-day-pill${isT ? ' today' : ''}">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></svg>
                ${esc(pillTxt)}
              </span>
              <span class="list-day-line"></span>
              <span class="list-day-count">${apts.length} cita${apts.length===1?'':'s'}</span>
            </div>
            <div class="list-rows">
              ${apts.map(a => listRowHtml(a)).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

function listRowHtml(a) {
  const cls = statusOf(a.status).cls;
  const dur = aptDuration(a);
  const status = a.status || 'pending';
  const isDoctor = currentUser && currentUser.role === 'doctor';

  // Action buttons by status
  let actions = '';
  if (status === 'pending') {
    actions = `<button class="btn-sm btn-primary" data-apt-action="confirm" data-apt-id="${a.id}">${SVG.check} Confirmar</button>`;
  } else if (status === 'waiting' && isDoctor) {
    actions = `<button class="btn-sm btn-primary" data-apt-action="register" data-apt-id="${a.id}">${SVG.bolt} Iniciar consulta</button>`;
  } else if (status === 'waiting') {
    actions = `<button class="btn-sm btn-secondary" data-apt-action="reschedule" data-apt-id="${a.id}">${SVG.refresh} Reprogramar</button>`;
  } else if (status === 'completed') {
    actions = `<button class="btn-sm btn-secondary" data-apt-action="view" data-apt-id="${a.id}">${SVG.eye} Ver consulta</button>`;
  } else if (status === 'cancelled') {
    actions = `<button class="btn-sm btn-secondary" data-apt-action="reagendar" data-apt-id="${a.id}">${SVG.refresh} Reagendar</button>`;
  }

  const pname = a.patient_name || '?';
  const init = nameInitials(pname);
  return `
    <div class="list-row ${cls}" data-apt-id="${a.id}">
      <div class="list-time">
        <div class="list-time-big">${fmtTime(a.scheduled_at)}</div>
        <div class="list-time-small">${dur} min</div>
      </div>
      <div class="list-pat">
        <div class="list-avatar">${init}</div>
        <div class="list-pat-info">
          <div class="list-pat-name-row">
            <div class="list-pat-name">${esc(pname)}</div>
          </div>
          <div class="list-pat-meta">
            <span class="list-pat-meta-item">${SVG.stethoscope}${esc(a.doctor_name ? 'Dr. ' + a.doctor_name : 'Sin doctor')}</span>
            ${a.specialty ? `<span class="list-pat-meta-item">${dotForSpecialty(a.specialty)}${esc(a.specialty)}</span>` : ''}
            ${a.notes ? `<span class="list-pat-meta-item">${SVG.notes}<em>${esc(String(a.notes).slice(0, 60))}${a.notes.length > 60 ? '…' : ''}</em></span>` : ''}
          </div>
        </div>
      </div>
      ${statusBadgeHtml(status)}
      <div class="list-actions" onclick="event.stopPropagation()">
        ${actions}
        <button class="btn-sm btn-ghost" data-apt-action="edit" data-apt-id="${a.id}" data-tip="Editar">${SVG.edit}</button>
      </div>
    </div>`;
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-apt-action]');
  if (!btn) return;
  e.stopPropagation();
  const action = btn.dataset.aptAction;
  const id = parseInt(btn.dataset.aptId);
  const apt = allAppts.find(a => a.id === id);
  if (!apt) return;
  if (action === 'confirm') changeStatus(id, 'waiting');
  else if (action === 'register') window.location.href = `${consultationPathForSpecialty(currentUser && currentUser.specialty)}?id=${id}`;
  else if (action === 'view') viewConsultation(id);
  else if (action === 'edit') openEdit(id);
  else if (action === 'reschedule' || action === 'reagendar') openEdit(id);
});

/* ─────────── Kanban view ─────────── */
function renderKanbanView(filtered) {
  const cols = [
    { k:'pending',   title:'Pendiente',  accent:'var(--warn-500)' },
    { k:'waiting',   title:'Esperando',  accent:'var(--info-500)' },
    { k:'completed', title:'Atendido',   accent:'var(--ok-500)' },
    { k:'cancelled', title:'Cancelado',  accent:'var(--bad-500)' },
  ];
  return `
    <div class="kanban-view">
      ${cols.map(col => {
        const apts = filtered.filter(a => (a.status||'pending') === col.k).sort((a,b) => aptDate(a) - aptDate(b));
        return `
          <div class="kanban-col glass">
            <div class="kanban-col-head">
              <span class="kanban-col-dot" style="background:${col.accent}"></span>
              <span class="kanban-col-title">${col.title}</span>
              <span class="kanban-col-count">${apts.length}</span>
            </div>
            <div class="kanban-cards">
              ${apts.length === 0 ? `<div class="kanban-empty">Sin citas</div>` : ''}
              ${apts.map(a => {
                const d = aptDate(a);
                const cls = statusOf(a.status).cls;
                return `
                  <div class="kanban-card ${cls}" data-apt-id="${a.id}">
                    <div class="kanban-card-time">
                      <span class="kanban-card-when">${d.getDate()} ${MONTH_SHORT[d.getMonth()]} · ${fmtTimeShort(a.scheduled_at)}</span>
                      <span class="kanban-card-dur">${aptDuration(a)}m</span>
                    </div>
                    <div class="kanban-card-name">${esc(a.patient_name || '?')}</div>
                    <div class="kanban-card-meta"><span style="width:5px;height:5px;border-radius:999px;background:var(--teal-600)"></span>${esc(a.specialty || 'Consulta')}</div>
                  </div>`;
              }).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

/* ─────────── Drawer ─────────── */
function openDrawer(id) {
  const a = allAppts.find(x => x.id === id);
  if (!a) return;
  const drawer = document.getElementById('apptDrawer');
  const backdrop = document.getElementById('drawerBackdrop');
  const status = a.status || 'pending';
  const m = STATUS_META[status];
  const start = aptDate(a);
  const dur = aptDuration(a);
  const end = new Date(start.getTime() + dur * 60000);

  // WhatsApp block
  const reminder = reminderMap[a.id];
  const waState = WhatsApp.getReminderState({
    whatsappEnabled: waConfig.whatsapp_enabled,
    patientWhatsapp: a.patient_phone || a.phone,
    reminderStatus: reminder ? reminder.reminder_status : null,
  });
  let waBlock = '';
  if (waState === 'manual_sent') {
    const sentAt = reminder && reminder.sent_at ? new Date(reminder.sent_at).toLocaleString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    waBlock = `<div class="wa-block sent">✓ WhatsApp enviado${sentAt ? ' · ' + esc(sentAt) : ''}${reminder.sent_by_name ? ' por ' + esc(reminder.sent_by_name) : ''}<button onclick="sendWhatsAppFromPopup(${a.id})">Reenviar</button></div>`;
  } else if (waState === 'pending') {
    waBlock = `<div style="margin-top:12px"><button class="btn-sm btn-success" style="width:100%;height:36px;font-size:13px" onclick="sendWhatsAppFromPopup(${a.id})">${SVG.whatsapp} Enviar recordatorio por WhatsApp</button></div>`;
  } else if (waState === 'no_whatsapp_number') {
    waBlock = `<div class="wa-block warn">Sin número WhatsApp · <a href="/patient.html?id=${a.patient_id}">Agregar</a></div>`;
  } else if (waState === 'whatsapp_disabled') {
    waBlock = `<div class="wa-block disabled">WhatsApp desactivado · <a href="/recordatorios.html">Configurar</a></div>`;
  }

  // Footer actions by status
  let footer = '';
  const isDoctor = currentUser && currentUser.role === 'doctor';
  if (status === 'pending') {
    footer = `
      <button class="btn-danger" onclick="changeStatus(${a.id}, 'cancelled')">${SVG.ban} Cancelar</button>
      <button class="btn-primary" onclick="changeStatus(${a.id}, 'waiting')">${SVG.check} Confirmar cita</button>`;
  } else if (status === 'waiting') {
    footer = `
      <button class="btn-secondary" onclick="openEdit(${a.id});closeDrawer()">${SVG.refresh} Reprogramar</button>
      ${isDoctor ? `<button class="btn-primary" onclick="closeDrawer();window.location.href='${consultationPathForSpecialty(currentUser && currentUser.specialty)}?id=${a.id}'">${SVG.bolt} Iniciar consulta</button>` : `<button class="btn-primary" onclick="changeStatus(${a.id}, 'completed')">${SVG.check} Marcar como atendida</button>`}`;
  } else if (status === 'completed') {
    footer = `
      <button class="btn-secondary" onclick="window.print()">${SVG.print} Imprimir</button>
      <button class="btn-primary" onclick="viewConsultation(${a.id})">${SVG.eye} Ver consulta</button>`;
  } else if (status === 'cancelled') {
    footer = `<button class="btn-primary" onclick="openEdit(${a.id});closeDrawer()">${SVG.refresh} Reagendar cita</button>`;
  }

  const pname = a.patient_name || '?';
  drawer.innerHTML = `
    <div class="drawer-head">
      <div class="drawer-head-left">
        <span class="drawer-id">Cita #${a.id}</span>
        <span class="status-badge ${m.cls}"><span class="dot"></span>${m.label}</span>
      </div>
      <div class="drawer-actions">
        <button class="drawer-icon-btn" data-tip="Editar" onclick="openEdit(${a.id});closeDrawer()">${SVG.edit}</button>
        <button class="drawer-icon-btn" data-tip="Imprimir" onclick="window.print()">${SVG.print}</button>
        <button class="drawer-icon-btn" data-tip="Cerrar" onclick="closeDrawer()">${SVG.close}</button>
      </div>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <div class="drawer-label">Paciente</div>
        <div class="drawer-pat-row">
          <div class="drawer-pat-avatar">${nameInitials(pname)}</div>
          <div style="flex:1;min-width:0">
            <div class="drawer-pat-name">${esc(pname)}</div>
            <div class="drawer-pat-sub"><a href="/patient.html?id=${a.patient_id}" style="color:var(--teal-700);text-decoration:none;font-weight:600">Ver expediente →</a></div>
          </div>
        </div>
        ${a.patient_phone || a.phone ? `
          <div class="drawer-quick-actions">
            <a class="btn-sm btn-secondary" href="tel:${esc(a.patient_phone || a.phone)}" style="text-decoration:none;justify-content:flex-start"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${esc(a.patient_phone || a.phone)}</a>
          </div>` : ''}
        ${waBlock}
      </div>

      <div class="drawer-section">
        <div class="drawer-label">Cita</div>
        <div class="detail-rows">
          <div class="detail-row">
            <div class="detail-icon">${SVG.calendar}</div>
            <div class="detail-content">
              <div class="detail-key">Fecha</div>
              <div class="detail-val"><strong>${fmtDateLongCap(start)}</strong></div>
            </div>
          </div>
          <div class="detail-row">
            <div class="detail-icon">${SVG.clock}</div>
            <div class="detail-content">
              <div class="detail-key">Horario</div>
              <div class="detail-val"><strong>${fmtTime(a.scheduled_at)} – ${fmtTime(end)}</strong> <span style="color:var(--ink-500);font-size:11.5px;margin-left:4px">(${dur} min)</span></div>
            </div>
          </div>
          <div class="detail-row">
            <div class="detail-icon">${SVG.tooth}</div>
            <div class="detail-content">
              <div class="detail-key">Especialidad</div>
              <div class="detail-val"><strong>${esc(a.specialty || 'Medicina General')}</strong></div>
            </div>
          </div>
          <div class="detail-row">
            <div class="detail-icon">${SVG.stethoscope}</div>
            <div class="detail-content">
              <div class="detail-key">Profesional</div>
              <div class="detail-val"><strong>${esc(a.doctor_name ? 'Dr. ' + a.doctor_name : (a.doctor_email ? 'Dr. ' + a.doctor_email.split('@')[0] : 'Sin doctor'))}</strong></div>
            </div>
          </div>
        </div>
      </div>

      ${a.notes ? `
        <div class="drawer-section">
          <div class="drawer-label">Notas</div>
          <div class="notes-box">${esc(a.notes)}</div>
        </div>` : ''}
    </div>
    <div class="drawer-footer">${footer}</div>
  `;

  drawer.style.display = 'flex';
  backdrop.style.display = 'block';
}

/* ─────────── WhatsApp (preserved) ─────────── */
let pendingWaConfirm = null;

async function sendWhatsAppFromPopup(appointmentId) {
  const a = allAppts.find(x => x.id === appointmentId);
  if (!a) return;

  if (!waConfig.whatsapp_enabled) {
    alert('WhatsApp está desactivado. Ve a Recordatorios para activarlo.');
    return;
  }

  let patientWa = a.patient_phone || a.phone;
  if (!patientWa) { alert('Este paciente no tiene número de teléfono registrado.'); return; }

  patientWa = WhatsApp.normalizePhone(patientWa);
  if (!WhatsApp.isValidPhone(patientWa)) { alert('Número de teléfono inválido.'); return; }

  const message = WhatsApp.buildReminderMessage({
    template: waConfig.whatsapp_template || '',
    patientName: a.patient_name,
    clinicName: waConfig.name,
    doctorName: a.doctor_name,
    scheduledAt: a.scheduled_at
  });

  WhatsApp.openWhatsApp(patientWa, message);

  pendingWaConfirm = { appointmentId, message };
  showWaConfirmModal(message);
}

function showWaConfirmModal(message) {
  let modal = document.getElementById('waConfirmModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'waConfirmModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:1rem;';
    modal.innerHTML = `
      <div style="background:white;border-radius:20px;width:100%;max-width:480px;padding:1.5rem;">
        <h3 style="font-size:1.15rem;font-weight:900;color:#0891b2;margin-bottom:1rem;">¿Marcar como enviado?</h3>
        <p style="color:#475569;font-size:0.9rem;margin-bottom:1rem;line-height:1.5;">Se abrió WhatsApp con el mensaje preparado. ¿Deseas marcar este recordatorio como enviado manualmente?</p>
        <div id="waMsgPreview" style="background:#f0fdf4;border-left:4px solid #16a34a;padding:0.85rem 1rem;border-radius:8px;font-size:0.85rem;color:#14532d;line-height:1.5;white-space:pre-wrap;max-height:200px;overflow-y:auto;margin-bottom:1rem;"></div>
        <button onclick="copyWaMessage()" style="padding:0.5rem 0.9rem;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;font-weight:700;color:#64748b;font-size:0.8rem;margin-bottom:1rem;">Copiar mensaje</button>
        <div style="display:flex;justify-content:flex-end;gap:0.6rem;">
          <button onclick="closeWaConfirm()" style="padding:0.7rem 1.2rem;background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;font-weight:700;color:#64748b;">Cancelar</button>
          <button onclick="confirmWaSent()" style="padding:0.7rem 1.2rem;background:linear-gradient(135deg,#16a34a,#22c55e);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:700;">Sí, marcar enviado</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }
  document.getElementById('waMsgPreview').textContent = message;
  modal.style.display = 'flex';
}

function closeWaConfirm() {
  pendingWaConfirm = null;
  const modal = document.getElementById('waConfirmModal');
  if (modal) modal.style.display = 'none';
}

async function copyWaMessage() {
  if (!pendingWaConfirm) return;
  const ok = await WhatsApp.copyMessage(pendingWaConfirm.message);
  if (ok) alert('Mensaje copiado al portapapeles');
}

async function confirmWaSent() {
  if (!pendingWaConfirm) return;
  try {
    await api('/api/reminders', {
      method: 'POST',
      body: { appointment_id: pendingWaConfirm.appointmentId, message_content: pendingWaConfirm.message }
    });
    closeWaConfirm();
    closeDrawer();
    await refreshReminders();
    renderEverything();
  } catch (e) {
    alert('Error al guardar: ' + e.message);
  }
}

async function viewConsultation(appointmentId) {
  try {
    const consultation = await api(`/api/consultations/appointment/${appointmentId}`);
    closeDrawer();
    const url = viewConsultationPathForSpecialty(consultation.specialty, consultation.id);
    window.location.href = url;
  } catch(err) {
    if (err && err.status === 404) {
      alert('Aún no hay una consulta registrada para esta cita.');
    } else {
      alert('No se pudo cargar la consulta: ' + (err && err.message ? err.message : 'error desconocido'));
    }
  }
}

/* ─────────── Modal: Nueva/Editar Cita (preserved) ─────────── */
function initializeDatePicker() {
  const dtInput = document.getElementById('fDatetime');
  if (!dtInput._calendarDatetimePicker) {
    const getOccupiedHours = (dateStr) => {
      return allAppts
        .filter(a => a.scheduled_at.startsWith(dateStr) && a.id !== editingId)
        .map(a => {
          const d = new Date(a.scheduled_at);
          return { h: d.getHours(), m: d.getMinutes() };
        });
    };
    replaceWithCalendarDatetimePicker(dtInput, { getOccupiedHours });
  }
}

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nueva Cita';
  document.getElementById('btnSubmit').textContent  = 'Crear Cita';

  document.getElementById('btnDelete').style.display = 'none';

function openEdit(id) {

  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar Cita';
  document.getElementById('btnSubmit').textContent  = 'Guardar Cambios';

  document.getElementById('btnDelete').style.display = 'inline-block';

function closeModal() { document.getElementById('overlay').style.display = 'none'; editingId = null; }
function clearMsg() { const m = document.getElementById('formMsg'); m.textContent = ''; m.className = 'form-msg'; }
function closeAppointmentReminder() { document.getElementById('appointmentReminder').style.display = 'none'; }

async function deleteCita() {
  if (!editingId) return;
  if (!confirm('¿Eliminar esta cita? Esta acción no se puede deshacer.')) return;
  try {
    await api(`/api/appointments/${editingId}`, { method: 'DELETE' });
    allAppts = await api('/api/appointments');
    renderEverything();
    closeModal();
  } catch(err) {
    const msgEl = document.getElementById('formMsg');
    msgEl.textContent = err.message; msgEl.className = 'form-msg err';
  }
}

async function submitCita(e) {
  e.preventDefault();
  const msgEl = document.getElementById('formMsg');
  const btnSubmit = document.getElementById('btnSubmit');
  const originalText = btnSubmit.textContent;
  btnSubmit.disabled = true;
  btnSubmit.textContent = 'Creando...';
  try {
    if (editingId) {
      await api(`/api/appointments/${editingId}`, { method:'PUT', body:{
        patient_id: +document.getElementById('fPatient').value,
        doctor_id: +document.getElementById('fDoctor').value,
        specialty: document.getElementById('fSpecialty').value,
        scheduled_at: document.getElementById('fDatetime').value,
        status: document.getElementById('fStatus').value
      }});
      msgEl.textContent = 'Cita actualizada'; msgEl.className = 'form-msg ok';
    } else {
      await api('/api/appointments', { method:'POST', body:{
        patient_id: +document.getElementById('fPatient').value,
        doctor_id:  +document.getElementById('fDoctor').value,
        specialty:   document.getElementById('fSpecialty').value,
        scheduled_at: document.getElementById('fDatetime').value
      }});
      msgEl.textContent = 'Cita creada'; msgEl.className = 'form-msg ok';
    }
    allAppts = await api('/api/appointments');
    renderEverything();
    closeModal();
  } catch(err) {
    msgEl.textContent = err.message;
    msgEl.className = 'form-msg err';
    btnSubmit.disabled = false;
    btnSubmit.textContent = originalText;
  }
}

/* ─────────── Dental Consultation modal (preserved) ─────────── */
let currentConsultId = null;
let currentPatientId = null;
let currentAppointmentId = null;
let odontogram1 = null;
let consultSubmitting = false;

async function openConsult(apptId) {
  try {
    const appt = allAppts.find(a => a.id === apptId);

    document.getElementById('consPatientName').textContent = esc(appt.patient_name);

}

function closeConsult() {
  document.getElementById('consultOverlay').style.display = 'none';
  currentConsultId = null;
}

async function submitConsult(e) {
  e.preventDefault();
  if (consultSubmitting) return;
  consultSubmitting = true;
  const msgEl = document.getElementById('consultMsg');
  const submitBtn = document.querySelector('#consultForm button[type="submit"]');
  if (submitBtn) submitBtn.disabled = true;
  try {
    const lifestyle = { drugs: document.querySelector('input[name="drugs"]:checked')?.value || '', alcohol: document.querySelector('input[name="alcohol"]:checked')?.value || '', smoking: document.querySelector('input[name="smoking"]:checked')?.value || '' };
    const cost = parseFloat(document.getElementById('consCost').value) || 0;
    const body = {
      patient_id: currentPatientId,
      notes: document.getElementById('consRadNotes').value,
      diagnosis: '',
      treatment: document.getElementById('consProcedures').value,
      odontogram_state: odontogram1 ? odontogram1.getState() : {},
      cost,
      payment_status: document.getElementById('consPayment').value,
      lifestyle: lifestyle,
      procedures: document.getElementById('consProcedures').value,
      radiography_notes: document.getElementById('consRadNotes').value,
      observations: document.getElementById('consObservations').value,
      appointment_id: currentAppointmentId
    };
    msgEl.textContent = 'Guardando...'; msgEl.className = 'form-msg ok';
    await api('/api/consultations', { method: 'POST', body });
    if (currentAppointmentId) {
      await api(`/api/appointments/${currentAppointmentId}/status`, { method: 'PUT', body: { status: 'completed' } });
    }
    allAppts = await api('/api/appointments');
    renderEverything();
    msgEl.textContent = 'Consulta guardada'; msgEl.className = 'form-msg ok';
    setTimeout(closeConsult, 900);
  } catch(err) { msgEl.textContent = err.message; msgEl.className = 'form-msg err'; if (submitBtn) submitBtn.disabled = false; consultSubmitting = false; }
}

function formatIdentityNumber(el) {
  let v = el.value.replace(/\D/g,'');
  if(v.length > 13) v = v.slice(0,13);
  if(v.length > 4) v = v.slice(0,4) + '-' + v.slice(4);
  if(v.length > 9) v = v.slice(0,9) + '-' + v.slice(9);
  el.value = v;
}

function populateBirthSelects() {
  const today = new Date();
  const y = document.getElementById('fBirthYear');
  if(y.children.length === 1) {
    for(let i = today.getFullYear(); i >= 1900; i--) {
      const o = document.createElement('option');
      o.value = String(i).slice(2); o.textContent = i;
      y.appendChild(o);
    }
  }
  const d = document.getElementById('fBirthDay');
  if(d.children.length === 1) {
    for(let i = 1; i <= 31; i++) {
      const o = document.createElement('option');
      o.value = String(i).padStart(2,'0'); o.textContent = i;
      d.appendChild(o);
    }
  }
}

async function submitPatient(e) {
  e.preventDefault();
  const form = document.getElementById('createForm');
  if(form.dataset.submitting === 'true') return;
  form.dataset.submitting = 'true';

  const msg = document.getElementById('formMsg');
  const submitBtn = form.querySelector('button[type="submit"]');
  const originalBtnText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Guardando...';

  try {
    const name = document.getElementById('fName').value;
    const id = document.getElementById('fId').value;
    const phone = document.getElementById('fPhone').value;
    const gender = document.getElementById('fGender').value;
    const day = document.getElementById('fBirthDay').value;
    const month = document.getElementById('fBirthMonth').value;
    const year = document.getElementById('fBirthYear').value;

    let birthDate = '';
    if(day && month && year) {
      const fullYear = year.length === 2 ? (parseInt(year) > 30 ? 1900 + parseInt(year) : 2000 + parseInt(year)) : year;
      birthDate = `${fullYear}-${month}-${day}`;
    }

    const newPatient = await api('/api/patients', {
      method: 'POST',
      body: { name, identity_number: id, phone, gender, birth_date: birthDate }
    });

    const fd = document.getElementById('fPatient');
    const option = document.createElement('option');
    option.value = newPatient.id;
    option.textContent = newPatient.name;
    fd.appendChild(option);
    fd.value = newPatient.id;
    allPatients.push(newPatient);

    msg.textContent = 'Paciente creado exitosamente';
    msg.className = 'form-msg ok';
    msg.style.display = 'block';

    setTimeout(() => {
      msg.classList.add('fade-out');
      setTimeout(closePatientModal, 300);
    }, 2000);
    form.dataset.submitting = 'false';
    submitBtn.disabled = false;
    submitBtn.textContent = originalBtnText;
  } catch(err) {
    msg.textContent = err.message;
    msg.className = 'form-msg err';
    msg.style.display = 'block';
    form.dataset.submitting = 'false';
    submitBtn.disabled = false;
    submitBtn.textContent = originalBtnText;
  }
}
</script>
</body>
