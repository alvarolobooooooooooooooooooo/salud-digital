<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salud Digital — Aceptar Invitación</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }

    .card {
      background: white;
      border-radius: 18px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      padding: 2rem 2.5rem;
      color: white;
    }

    .card-header h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.4rem; }
    .card-header p { font-size: 0.9rem; opacity: 0.9; }

    .card-body { padding: 2rem 2.5rem; }

    .invite-info {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
      font-size: 0.9rem;
      color: #0369a1;
    }

    .invite-info strong { display: block; font-size: 1rem; color: #0f172a; margin-bottom: 0.25rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: #0f172a; margin-bottom: 0.5rem; }
    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #0f172a;
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #0891b2; box-shadow: 0 0 0 3px rgba(8,145,178,0.1); }
    .form-group input:disabled { background: #f8fafc; color: #94a3b8; }

    .form-section-title { font-size: 0.9rem; font-weight: 700; color: #0f172a; margin-top: 1.5rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #e2e8f0; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 440px) { .form-row { grid-template-columns: 1fr; } }

    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(8,145,178,0.3);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(8,145,178,0.4); }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }

    .msg { margin-top: 1rem; padding: 0.85rem 1rem; border-radius: 8px; font-size: 0.875rem; display: none; }
    .msg.ok { background: #f0fdf4; color: #15803d; display: block; }
    .msg.err { background: #fef2f2; color: #dc2626; display: block; }

    .loading { text-align: center; padding: 3rem; color: #64748b; }
    .invalid { text-align: center; padding: 2rem; }
    .invalid h2 { color: #dc2626; margin-bottom: 0.75rem; }
    .invalid p { color: #64748b; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card" id="cardContent">
    <div class="loading">Verificando invitación...</div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');

    async function init() {
      if (!token) return showInvalid('Enlace de invitación inválido.');

      try {
        const res = await fetch(`/api/invitations/${token}`);
        const data = await res.json();
        if (!res.ok) return showInvalid(data.error || 'Invitación no válida.');
        showForm(data);
      } catch {
        showInvalid('Error al verificar la invitación.');
      }
    }

    function showInvalid(msg) {
      document.getElementById('cardContent').innerHTML = `
        <div class="invalid">
          <h2>Invitación inválida</h2>
          <p>${msg}</p>
        </div>
      `;
    }

    function showForm(data) {
      const isClinicAdmin = data.role === 'clinic_admin';
      const headerSubtitle = isClinicAdmin
        ? 'Registra tu clínica e información de acceso'
        : 'Crea tu contraseña para acceder a la plataforma';

      let clinicFields = '';
      if (isClinicAdmin) {
        clinicFields = `
          <div class="form-section-title">Información de la Clínica</div>
          <div class="form-group">
            <label>Nombre de la Clínica</label>
            <input type="text" id="fClinicName" placeholder="Nombre completo" autofocus>
          </div>
          <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="fAddress" placeholder="Calle y número">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Número de Sillas</label>
              <input type="number" id="fChairs" placeholder="Ej: 2" min="1" value="1">
            </div>
            <div class="form-group">
              <label>Teléfono</label>
              <input type="tel" id="fPhone" placeholder="Teléfono">
            </div>
          </div>
          <div class="form-group">
            <label>Especialidades</label>
            <input type="text" id="fSpecialties" placeholder="Ej: Odontología, Medicina General">
          </div>
          <div class="form-group">
            <label>Email de la Clínica</label>
            <input type="email" id="fClinicEmail" placeholder="Email de contacto">
          </div>
          <div class="form-section-title">Datos de Acceso</div>
        `;
      }

      document.getElementById('cardContent').innerHTML = `
        <div class="card-header">
          <h1>Aceptar Invitación</h1>
          <p>${headerSubtitle}</p>
        </div>
        <div class="card-body">
          <div class="invite-info">
            <strong>${data.name}</strong>
            ${isClinicAdmin ? 'Invitado a crear y administrar una clínica en <b>Salud Digital</b>' : `Invitado a <b>${data.clinicName}</b> como médico`}
          </div>
          ${clinicFields}
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="fEmail" value="${data.email}" disabled>
          </div>
          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="fPassword" placeholder="Mínimo 6 caracteres" ${!isClinicAdmin ? 'autofocus' : ''}>
          </div>
          <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" id="fConfirm" placeholder="Repite tu contraseña">
          </div>
          <button class="btn" id="btnAccept" onclick="accept()">Crear mi cuenta</button>
          <div class="msg" id="msg"></div>
        </div>
      `;
    }

    async function accept() {
      const password = document.getElementById('fPassword').value.trim();
      const confirm = document.getElementById('fConfirm').value.trim();
      const msgEl = document.getElementById('msg');
      const btn = document.getElementById('btnAccept');

      msgEl.className = 'msg';

      if (password.length < 6) {
        msgEl.className = 'msg err';
        msgEl.textContent = 'La contraseña debe tener al menos 6 caracteres';
        return;
      }
      if (password !== confirm) {
        msgEl.className = 'msg err';
        msgEl.textContent = 'Las contraseñas no coinciden';
        return;
      }

      const isClinicAdmin = document.getElementById('fClinicName');
      const payload = { password };

      if (isClinicAdmin) {
        const clinicName = document.getElementById('fClinicName').value.trim();
        if (!clinicName) {
          msgEl.className = 'msg err';
          msgEl.textContent = 'El nombre de la clínica es requerido';
          return;
        }
        payload.clinic = {
          name: clinicName,
          address: document.getElementById('fAddress').value.trim(),
          chairs: parseInt(document.getElementById('fChairs').value) || 1,
          specialties: document.getElementById('fSpecialties').value.trim(),
          phone: document.getElementById('fPhone').value.trim(),
          email: document.getElementById('fClinicEmail').value.trim(),
        };
      }

      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        const res = await fetch(`/api/invitations/${token}/accept`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) {
          msgEl.className = 'msg err';
          msgEl.textContent = data.error || 'Error al crear cuenta';
          btn.disabled = false;
          btn.textContent = 'Crear mi cuenta';
          return;
        }
        msgEl.className = 'msg ok';
        msgEl.textContent = '¡Cuenta creada! Redirigiendo al login...';
        setTimeout(() => { location.href = '/login.html'; }, 2000);
      } catch {
        msgEl.className = 'msg err';
        msgEl.textContent = 'Error de conexión';
        btn.disabled = false;
        btn.textContent = 'Crear mi cuenta';
      }
    }

    init();
  </script>
</body>
</html>
