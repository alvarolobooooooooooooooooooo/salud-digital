<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaludDigital — Mi Plan</title>
  <link rel="stylesheet" href="/layout.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes floatBg {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(50px) translateX(30px); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #ecf9fc 100%);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(8, 145, 178, 0.12) 0%, transparent 70%);
      top: -200px;
      right: -300px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 20s ease-in-out infinite;
      filter: blur(60px);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      bottom: -200px;
      left: -200px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 25s ease-in-out infinite reverse;
      filter: blur(60px);
      pointer-events: none;
    }

    main {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 3rem;
      animation: fadeSlideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.04em;
    }

    .page-header p {
      color: #64748b;
      font-size: 1rem;
      font-weight: 600;
    }

    .plan-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards 0.1s;
      opacity: 0;
    }

    .plan-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 249, 255, 0.95) 100%);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 3rem;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      box-shadow:
        0 0 100px rgba(8, 145, 178, 0.12),
        0 30px 60px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(8, 145, 178, 0.05);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .plan-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
      pointer-events: none;
    }

    .plan-card:hover {
      transform: translateY(-6px);
      box-shadow:
        0 0 120px rgba(8, 145, 178, 0.15),
        0 40px 80px rgba(8, 145, 178, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(8, 145, 178, 0.08);
    }

    .plan-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2.5rem;
      gap: 1rem;
    }

    .plan-name {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .plan-name h2 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
      text-transform: capitalize;
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      width: fit-content;
      padding: 0.6rem 1.2rem;
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color: white;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
    }

    .plan-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .plan-price {
      text-align: right;
    }

    .plan-price-amount {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .plan-price-period {
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .plan-features {
      margin-bottom: 2.5rem;
    }

    .plan-features-title {
      font-size: 0.8rem;
      font-weight: 900;
      color: #0891b2;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.25rem;
    }

    .features-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1rem;
      background: rgba(8, 145, 178, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(8, 145, 178, 0.1);
      transition: all 0.2s;
    }

    .feature-item:hover {
      background: rgba(8, 145, 178, 0.08);
      border-color: rgba(8, 145, 178, 0.2);
      transform: translateX(4px);
    }

    .feature-check {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.85rem;
      font-weight: 900;
      flex-shrink: 0;
    }

    .feature-text {
      font-size: 0.9rem;
      font-weight: 700;
      color: #334155;
    }

    .plan-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.5rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(8, 145, 178, 0.1);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 800;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .plan-cta {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(8, 145, 178, 0.4);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #0891b2;
      border: 2px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #ecf9fc;
      border-color: #0891b2;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      font-size: 1.1rem;
      color: #64748b;
    }

    .loading::after {
      content: '';
      width: 30px;
      height: 30px;
      border: 3px solid rgba(8, 145, 178, 0.2);
      border-top-color: #0891b2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.75rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      main { padding: 1.5rem 1rem; }
      .page-header h1 { font-size: 1.8rem; }
      .plan-card { padding: 1.5rem; }
      .plan-header { flex-direction: column; }
      .plan-price { text-align: left; margin-top: 1rem; }
      .plan-price-amount { font-size: 1.8rem; }
      .features-list { grid-template-columns: 1fr; }
      .plan-stats { grid-template-columns: repeat(3, 1fr); }
      .btn { font-size: 0.8rem; padding: 0.8rem 1.5rem; }
    }

    main::-webkit-scrollbar {
      width: 6px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.4) 0%, rgba(6, 182, 212, 0.4) 100%);
      border-radius: 3px;
    }

    main::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.6) 0%, rgba(6, 182, 212, 0.6) 100%);
    }
  </style>
</head>
<body>

<main class="layout-main">
  <div class="page-header">
    <h1>Mi Plan</h1>
    <p>Información de tu suscripción actual</p>
  </div>

  <div class="plan-container" id="planContainer">
    <div class="loading">Cargando plan...</div>
  </div>
</main>

<script src="/icons.js"></script>
<script src="/common.js"></script>
<script src="/layout.js"></script>
<script>
  requireAuth(['clinic_admin']);

  const planFeatures = {
    basic: [
      'Hasta 100 pacientes',
      '2 doctores',
      'Consultas ilimitadas',
      'Reportes básicos',
      'Soporte por email'
    ],
    professional: [
      'Hasta 500 pacientes',
      'Doctores ilimitados',
      'Consultas ilimitadas',
      'Reportes avanzados',
      'Recordatorios WhatsApp',
      'Soporte prioritario',
      'API access'
    ],
    enterprise: [
      'Pacientes ilimitados',
      'Doctores ilimitados',
      'Consultas ilimitadas',
      'Reportes personalizados',
      'Recordatorios WhatsApp',
      'Soporte 24/7',
      'API access',
      'Integración personalizada'
    ]
  };

  const planNames = {
    basic: 'Plan Básico',
    professional: 'Plan Profesional',
    enterprise: 'Plan Empresarial'
  };

  const planPrices = {
    basic: '$49',
    professional: '$149',
    enterprise: 'Contactar'
  };

  (async () => {
    try {
      const plan = await api('/api/clinics/plan/info');

      const features = planFeatures[plan.plan_type] || planFeatures.professional;
      const displayName = planNames[plan.plan_type] || 'Plan Profesional';
      const displayPrice = planPrices[plan.plan_type] || '$149';

      const expiresDate = plan.plan_expires_at
        ? new Date(plan.plan_expires_at).toLocaleDateString('es-ES', { month: 'long', day: 'numeric', year: 'numeric' })
        : 'Sin vencimiento';

      const html = `
        <div class="plan-card">
          <div class="plan-header">
            <div class="plan-name">
              <h2>${esc(displayName)}</h2>
              <div class="plan-badge">${plan.plan_status === 'active' ? '✓ Activo' : plan.plan_status}</div>
            </div>
            <div class="plan-price">
              <div class="plan-price-amount">${displayPrice}</div>
              <div class="plan-price-period">/${esc(plan.billing_cycle)}</div>
            </div>
          </div>

          <div class="plan-features">
            <div class="plan-features-title">Incluido en tu plan</div>
            <div class="features-list">
              ${features.map(f => `
                <div class="feature-item">
                  <div class="feature-check">✓</div>
                  <div class="feature-text">${esc(f)}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="plan-stats">
            <div class="stat-item">
              <div class="stat-label">Pacientes Activos</div>
              <div class="stat-value">${plan.stats.total_patients}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Doctores</div>
              <div class="stat-value">${plan.stats.total_doctors}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Consultas Este Mes</div>
              <div class="stat-value">${plan.stats.consultations_this_month}</div>
            </div>
          </div>

          <div class="plan-cta">
            <button class="btn btn-primary" onclick="alert('Contacta a ventas para mejorar tu plan')">
              Mejorar Plan
            </button>
            <button class="btn btn-secondary" onclick="alert('Para cambios en tu suscripción, contacta a soporte')">
              Contactar Soporte
            </button>
          </div>

          <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid rgba(8, 145, 178, 0.1); color: #94a3b8; font-size: 0.85rem;">
            <strong>Clínica:</strong> ${esc(plan.clinic_name)}<br>
            <strong>Próxima renovación:</strong> ${esc(expiresDate)}
          </div>
        </div>
      `;

      document.getElementById('planContainer').innerHTML = html;
    } catch (e) {
      console.error(e);
      document.getElementById('planContainer').innerHTML = `
        <div class="plan-card" style="text-align: center; padding: 3rem;">
          <p style="color: #ef4444; font-size: 1.1rem;">Error al cargar el plan</p>
          <p style="color: #94a3b8; margin-top: 0.5rem;">${esc(e.message)}</p>
        </div>
      `;
    }
  })();
</script>
</body>
</html>
