<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaludDigital — Mi Plan</title>
  <link rel="stylesheet" href="/layout.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes floatBg {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(80px) translateX(40px); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -2000px 0; }
      100% { background-position: 2000px 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 30px rgba(8, 145, 178, 0.5), 0 0 60px rgba(6, 182, 212, 0.3); }
      50% { box-shadow: 0 0 50px rgba(8, 145, 178, 0.8), 0 0 100px rgba(6, 182, 212, 0.5); }
    }

    @keyframes slideRight {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1a2847 25%, #132a4d 50%, #1f3a5f 75%, #2d5a7b 100%);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      width: 1200px;
      height: 1200px;
      background: radial-gradient(circle, rgba(8, 145, 178, 0.25) 0%, transparent 70%);
      top: -400px;
      right: -500px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 25s ease-in-out infinite;
      filter: blur(80px);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.2) 0%, transparent 70%);
      bottom: -300px;
      left: -400px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 30s ease-in-out infinite reverse;
      filter: blur(80px);
      pointer-events: none;
    }

    main {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 4rem 2rem;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 4rem;
      animation: fadeSlideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    .page-header h1 {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 25%, #06b6d4 50%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 200%;
      animation: shimmer 8s ease infinite;
      margin-bottom: 0.75rem;
      letter-spacing: -0.04em;
      text-shadow: 0 0 40px rgba(6, 182, 212, 0.3);
    }

    .page-header p {
      color: #cbd5e1;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .plan-wrapper {
      display: grid;
      grid-template-columns: 1fr;
      gap: 3rem;
      animation: fadeSlideUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards 0.2s;
      opacity: 0;
    }

    .plan-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 50%, rgba(15, 23, 42, 0.8) 100%);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 48px;
      padding: 4rem;
      border: 1.5px solid rgba(6, 182, 212, 0.4);
      box-shadow:
        0 0 80px rgba(8, 145, 178, 0.3),
        0 0 160px rgba(6, 182, 212, 0.15),
        inset 0 1px 20px rgba(255, 255, 255, 0.1),
        inset 0 -1px 20px rgba(8, 145, 178, 0.1);
      position: relative;
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: glow 4s ease-in-out infinite;
    }

    .plan-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: linear-gradient(45deg, transparent 0%, rgba(6, 182, 212, 0.1) 50%, transparent 100%);
      animation: shimmer 3s ease infinite;
      pointer-events: none;
    }

    .plan-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.8), transparent);
      pointer-events: none;
    }

    .plan-card:hover {
      transform: translateY(-8px);
      border-color: rgba(6, 182, 212, 0.7);
      box-shadow:
        0 0 120px rgba(8, 145, 178, 0.5),
        0 0 240px rgba(6, 182, 212, 0.3),
        inset 0 1px 20px rgba(255, 255, 255, 0.15),
        inset 0 -1px 20px rgba(8, 145, 178, 0.15);
    }

    .plan-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 3.5rem;
      gap: 2rem;
      position: relative;
      z-index: 2;
    }

    .plan-name {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .plan-name h2 {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 50%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      text-transform: capitalize;
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      width: fit-content;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%);
      color: #065f46;
      border-radius: 16px;
      font-weight: 900;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      box-shadow:
        0 8px 32px rgba(16, 185, 129, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(20px);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .plan-badge::before {
      content: '';
      width: 10px;
      height: 10px;
      background: #065f46;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .plan-price {
      text-align: right;
      animation: slideRight 0.8s ease-out 0.3s forwards;
      opacity: 0;
    }

    .plan-price-amount {
      font-size: 3.2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 50%, #0891b2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.03em;
    }

    .plan-price-period {
      color: #94a3b8;
      font-size: 0.95rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
    }

    .plan-features {
      margin-bottom: 3.5rem;
      position: relative;
      z-index: 2;
    }

    .plan-features-title {
      font-size: 0.85rem;
      font-weight: 900;
      color: #06b6d4;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .plan-features-title::before {
      content: '';
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #06b6d4, #0ea5e9);
      border-radius: 3px;
    }

    .features-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.5rem;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.08) 0%, rgba(8, 145, 178, 0.04) 100%);
      border-radius: 16px;
      border: 1.5px solid rgba(6, 182, 212, 0.2);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .feature-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(6, 182, 212, 0.1), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .feature-item:hover {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, rgba(8, 145, 178, 0.08) 100%);
      border-color: rgba(6, 182, 212, 0.4);
      transform: translateX(6px) translateY(-3px);
      box-shadow: 0 12px 24px rgba(6, 182, 212, 0.15);
    }

    .feature-item:hover::before {
      opacity: 1;
    }

    .feature-check {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.9rem;
      font-weight: 900;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }

    .feature-text {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e2e8f0;
      position: relative;
      z-index: 1;
    }

    .plan-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 2rem;
      padding: 2.5rem 0;
      border-top: 1.5px solid rgba(6, 182, 212, 0.2);
      border-bottom: 1.5px solid rgba(6, 182, 212, 0.2);
      position: relative;
      z-index: 2;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-align: center;
      animation: slideRight 0.8s ease-out forwards;
      opacity: 0;
    }

    .stat-item:nth-child(1) { animation-delay: 0.4s; }
    .stat-item:nth-child(2) { animation-delay: 0.5s; }
    .stat-item:nth-child(3) { animation-delay: 0.6s; }

    .stat-label {
      font-size: 0.8rem;
      font-weight: 900;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .plan-cta {
      display: flex;
      gap: 1.5rem;
      margin-top: 3rem;
      position: relative;
      z-index: 2;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem 2.5rem;
      border-radius: 16px;
      border: none;
      font-weight: 900;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary {
      background: linear-gradient(135deg, #06b6d4 0%, #0ea5e9 50%, #0891b2 100%);
      color: white;
      box-shadow:
        0 12px 40px rgba(6, 182, 212, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow:
        0 20px 60px rgba(6, 182, 212, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-secondary {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(8, 145, 178, 0.05) 100%);
      color: #06b6d4;
      border: 2px solid rgba(6, 182, 212, 0.3);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2) 0%, rgba(8, 145, 178, 0.1) 100%);
      border-color: rgba(6, 182, 212, 0.6);
      transform: translateY(-4px);
      box-shadow:
        0 12px 32px rgba(6, 182, 212, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .plan-footer {
      margin-top: 2.5rem;
      padding-top: 2.5rem;
      border-top: 1.5px solid rgba(6, 182, 212, 0.15);
      position: relative;
      z-index: 2;
    }

    .footer-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
    }

    .info-block {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .info-label {
      font-size: 0.8rem;
      font-weight: 900;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2e8f0;
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      font-size: 1.2rem;
      color: #cbd5e1;
      position: relative;
      z-index: 2;
    }

    .loading::after {
      content: '';
      width: 40px;
      height: 40px;
      border: 3px solid rgba(6, 182, 212, 0.2);
      border-top-color: #06b6d4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      main { padding: 2rem 1rem; }
      .page-header h1 { font-size: 2rem; }
      .plan-card { padding: 2rem; border-radius: 32px; }
      .plan-header { flex-direction: column; }
      .plan-price { text-align: left; margin-top: 1.5rem; }
      .plan-price-amount { font-size: 2rem; }
      .features-list { grid-template-columns: 1fr; }
      .plan-stats { grid-template-columns: repeat(3, 1fr); gap: 1rem; padding: 1.5rem 0; }
      .btn { padding: 0.9rem 1.5rem; font-size: 0.85rem; }
      .plan-cta { flex-direction: column; }
      .footer-info { grid-template-columns: 1fr; }
    }

    main::-webkit-scrollbar {
      width: 8px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(6, 182, 212, 0.5), rgba(8, 145, 178, 0.5));
      border-radius: 4px;
    }

    main::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(6, 182, 212, 0.8), rgba(8, 145, 178, 0.8));
    }
  </style>
</head>
<body>

<main class="layout-main">
  <div class="page-header">
    <h1>Mi Plan</h1>
    <p>Tu suscripción premium</p>
  </div>

  <div class="plan-wrapper" id="planContainer">
    <div class="loading">Cargando tu plan...</div>
  </div>
</main>

<script src="/icons.js"></script>
<script src="/common.js"></script>
<script src="/layout.js"></script>
<script>
  requireAuth(['clinic_admin']);

  const planFeatures = {
    basic: [
      'Hasta 100 pacientes',
      '2 doctores',
      'Consultas ilimitadas',
      'Reportes básicos',
      'Soporte por email'
    ],
    professional: [
      'Hasta 500 pacientes',
      'Doctores ilimitados',
      'Consultas ilimitadas',
      'Reportes avanzados',
      'Recordatorios WhatsApp',
      'Soporte prioritario',
      'API access'
    ],
    enterprise: [
      'Pacientes ilimitados',
      'Doctores ilimitados',
      'Consultas ilimitadas',
      'Reportes personalizados',
      'Recordatorios WhatsApp',
      'Soporte 24/7',
      'API access',
      'Integración personalizada'
    ]
  };

  const planNames = {
    basic: 'Básico',
    professional: 'Profesional',
    enterprise: 'Empresarial'
  };

  const planPrices = {
    basic: '$49',
    professional: '$149',
    enterprise: 'Contactar'
  };

  (async () => {
    try {
      const plan = await api('/api/clinics/plan/info');

      const features = planFeatures[plan.plan_type] || planFeatures.professional;
      const displayName = planNames[plan.plan_type] || 'Profesional';
      const displayPrice = planPrices[plan.plan_type] || '$149';

      const expiresDate = plan.plan_expires_at
        ? new Date(plan.plan_expires_at).toLocaleDateString('es-ES', { month: 'long', day: 'numeric', year: 'numeric' })
        : 'Sin vencimiento';

      const html = `
        <div class="plan-card">
          <div class="plan-header">
            <div class="plan-name">
              <h2>Plan ${esc(displayName)}</h2>
              <div class="plan-badge">${plan.plan_status === 'active' ? '✓ Activo' : plan.plan_status}</div>
            </div>
            <div class="plan-price">
              <div class="plan-price-amount">${displayPrice}</div>
              <div class="plan-price-period">/${esc(plan.billing_cycle)}</div>
            </div>
          </div>

          <div class="plan-features">
            <div class="plan-features-title">Incluido en tu plan</div>
            <div class="features-list">
              ${features.map(f => `
                <div class="feature-item">
                  <div class="feature-check">✓</div>
                  <div class="feature-text">${esc(f)}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="plan-stats">
            <div class="stat-item">
              <div class="stat-label">Pacientes Activos</div>
              <div class="stat-value">${plan.stats.total_patients}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Doctores</div>
              <div class="stat-value">${plan.stats.total_doctors}</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">Consultas Este Mes</div>
              <div class="stat-value">${plan.stats.consultations_this_month}</div>
            </div>
          </div>

          <div class="plan-cta">
            <button class="btn btn-primary" onclick="alert('Contacta a ventas para upgradear tu plan')">
              Upgradear Plan
            </button>
            <button class="btn btn-secondary" onclick="alert('Para cambios en tu suscripción, contacta a soporte')">
              Contactar Soporte
            </button>
          </div>

          <div class="plan-footer">
            <div class="footer-info">
              <div class="info-block">
                <div class="info-label">Clínica</div>
                <div class="info-value">${esc(plan.clinic_name)}</div>
              </div>
              <div class="info-block">
                <div class="info-label">Próxima Renovación</div>
                <div class="info-value">${esc(expiresDate)}</div>
              </div>
              <div class="info-block">
                <div class="info-label">Ciclo de Facturación</div>
                <div class="info-value">${esc(plan.billing_cycle.charAt(0).toUpperCase() + plan.billing_cycle.slice(1))}</div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('planContainer').innerHTML = html;
    } catch (e) {
      console.error(e);
      document.getElementById('planContainer').innerHTML = `
        <div class="plan-card" style="text-align: center; padding: 3rem; position: relative; z-index: 2;">
          <p style="color: #ef4444; font-size: 1.2rem; margin-bottom: 0.5rem;">⚠ Error al cargar el plan</p>
          <p style="color: #94a3b8;">${esc(e.message)}</p>
        </div>
      `;
    }
  })();
</script>
</body>
</html>
