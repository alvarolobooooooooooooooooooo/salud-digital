<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="140" height="105">
  <defs>
    <linearGradient id="footGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="archGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Pie Normal -->
  <g transform="translate(20, 30)">
    <!-- Talón -->
    <circle cx="25" cy="95" r="18" fill="url(#footGradient)" stroke="#d8b4fe" stroke-width="1.5"/>
    <!-- Planta del pie -->
    <path d="M 25 77 Q 40 70 60 65 Q 75 63 85 70 Q 88 85 85 110 Q 70 120 50 122 Q 35 120 25 113 Z"
          fill="url(#footGradient)" stroke="#d8b4fe" stroke-width="1.5"/>
    <!-- Arco plantar -->
    <ellipse cx="45" cy="88" rx="12" ry="18" fill="url(#archGradient)" opacity="0.6"/>
    <!-- Dedos -->
    <g stroke="#d8b4fe" stroke-width="1.5" fill="url(#footGradient)">
      <ellipse cx="62" cy="58" rx="6" ry="10"/>
      <ellipse cx="72" cy="56" rx="5.5" ry="9"/>
      <ellipse cx="81" cy="57" rx="5" ry="8"/>
      <ellipse cx="89" cy="60" rx="4.5" ry="7"/>
    </g>
  </g>

  <text x="120" y="170" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Pie Normal</text>
</svg>