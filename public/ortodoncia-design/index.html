  <title>Ortodoncia — Diagrama clínico · Salud Digital</title>
  <script>
    // Bootstrap theme before first paint. Parent passes ?theme=dark|light
    // and can update later via postMessage({type:'orto:theme', theme:'...'}).
    (function () {
      try {
        var p = new URLSearchParams(window.location.search);
        var t = p.get('theme');
        if (t !== 'dark' && t !== 'light') t = 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {}
      window.addEventListener('message', function (e) {
        var d = e.data || {};
        if (d.type === 'orto:theme' && (d.theme === 'dark' || d.theme === 'light')) {
          document.documentElement.setAttribute('data-theme', d.theme);
        }
      });
    })();
  </script>

<body>
  <style>
    /* Pre-size root so React mount doesn't cause layout shift (prevents RO loop) */
    html, body { margin: 0; padding: 0; height: 100%; }
    #root { width: 100%; height: 100vh; display: block; contain: layout style; overflow: hidden; }
    #boot {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: #F7F9FC; color: #8A93A4;
      font-family: system-ui, sans-serif; font-size: 13px;
    }
    html[data-theme="dark"] body, html[data-theme="dark"] #boot { background: #0b1424; color: #8A93A4; }
  </style>
  <div id="root">
    <div id="boot">Cargando diagrama clínico…</div>
  </div>

  <script>
    // Suppress benign ResizeObserver loop warning (Chrome quirk)
    // Wrap ResizeObserver to debounce via rAF — eliminates the loop entirely.
    (function() {
      if (!window.ResizeObserver) return;
      const OriginalRO = window.ResizeObserver;
      window.ResizeObserver = class extends OriginalRO {
        constructor(cb) {
          let scheduled = false;
          let lastEntries = null;
          let lastObserver = null;
          super((entries, observer) => {
            lastEntries = entries;
            lastObserver = observer;
            if (scheduled) return;
            scheduled = true;
            window.requestAnimationFrame(() => {
              scheduled = false;
              try { cb(lastEntries, lastObserver); } catch (e) {}
            });
          });
        }
      };
      // Also belt-and-suspenders: silence the message
      const orig = window.console.error;
      window.console.error = function(...args) {
        if (typeof args[0] === 'string' && args[0].includes('ResizeObserver')) return;
        return orig.apply(window.console, args);
      };
      window.addEventListener('error', (e) => {
        if (e.message && e.message.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
    })();
  </script>
