<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaludDigital — Consentimientos</title>
  <link rel="stylesheet" href="/layout.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes floatBg {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(50px) translateX(30px); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #ecf9fc 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(8, 145, 178, 0.12) 0%, transparent 70%);
      top: -200px;
      right: -300px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 20s ease-in-out infinite;
      filter: blur(60px);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      bottom: -200px;
      left: -200px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 25s ease-in-out infinite reverse;
      filter: blur(60px);
      pointer-events: none;
    }

    main {
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      position: relative;
      z-index: 1;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 2rem;
    }

    .header-content h1 {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.04em;
    }

    .header-content p {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
      font-weight: 600;
    }

    .section {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 249, 255, 0.95) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow:
        0 0 100px rgba(8, 145, 178, 0.08),
        0 20px 50px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(8, 145, 178, 0.05);
      margin-bottom: 2rem;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
    }

    .section::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
      pointer-events: none;
    }

    .section:hover {
      transform: translateY(-4px);
      box-shadow:
        0 0 120px rgba(8, 145, 178, 0.12),
        0 25px 60px rgba(8, 145, 178, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(8, 145, 178, 0.08);
    }

    .section h3 {
      font-size: 1.15rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: -0.04em;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 1.8rem;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 18px rgba(8, 145, 178, 0.25);
      white-space: nowrap;
      -webkit-text-fill-color: white;
      background-clip: unset;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.35);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .95rem;
    }

    th {
      text-align: left;
      padding: 1rem 0.5rem;
      background: transparent;
      font-weight: 900;
      font-size: .8rem;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
      letter-spacing: .12em;
      border-bottom: 1px solid rgba(8, 145, 178, 0.08);
    }

    td {
      padding: 1rem 0.5rem;
      border-bottom: 1px solid rgba(8, 145, 178, 0.04);
      font-weight: 700;
      font-size: .9rem;
      color: #475569;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td {
      background: linear-gradient(90deg, rgba(8, 145, 178, 0.04) 0%, transparent 100%);
    }

    .empty-table {
      padding: 2.5rem;
      text-align: center;
      color: #94a3b8;
      font-size: .9rem;
    }

    .status-badge {
      display: inline-block;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-signed {
      background: #dcfce7;
      color: #15803d;
    }

    .status-pending {
      background: #fef3c7;
      color: #b45309;
    }

    .status-expired {
      background: #fee2e2;
      color: #b91c1c;
    }

    @media (max-width: 860px) {
      main { padding: 1rem 0.75rem; }
      .header-content h1 { font-size: 1.4rem; }
      .header-content p { font-size: 0.9rem; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; margin-bottom: 1rem; }
      .section { margin-bottom: 1rem; padding: 1rem; }
      .section h3 { flex-direction: column; align-items: flex-start; gap: 0.75rem; font-size: 1.1rem; margin-bottom: 0.75rem; }
      .btn-primary {
        width: 100%;
        justify-content: center;
        padding: 0.7rem 1.3rem;
        font-size: 0.9rem;
        gap: 0.4rem;
      }
      table { font-size: 0.82rem; width: 100%; }
      th { padding: 0.5rem 0.3rem; font-size: 0.75rem; }
      td { padding: 0.4rem 0.3rem; font-size: 0.82rem; }
      td button { font-size: 0.6rem !important; padding: 0.3rem 0.6rem !important; margin-left: 0.3rem !important; }
      .status-badge { padding: 0.2rem 0.4rem; font-size: 0.6rem; }
    }

    @media (max-width: 540px) {
      main { padding: 1rem 0.75rem; }
      .header-content h1 { font-size: 1.8rem; }
      .header-content p { font-size: 1rem; }
      .section { padding: 1rem; }
      .btn-primary { padding: 0.6rem 1.2rem; font-size: 0.88rem; }
      table { font-size: 0.8rem; }
      th { padding: 0.4rem 0.25rem; font-size: 0.72rem; }
      td { padding: 0.35rem 0.25rem; font-size: 0.8rem; }
      td button { font-size: 0.68rem !important; padding: 0.25rem 0.5rem !important; margin-left: 0.2rem !important; }
      .status-badge { padding: 0.18rem 0.35rem; font-size: 0.68rem; }
    }

    @media (max-width: 480px) {
      main { padding: 1rem 0.75rem; }
      .header-content h1 { font-size: 1.6rem; }
      .header-content p { font-size: 0.95rem; }
      .section { padding: 1rem; }
      .btn-primary { padding: 0.55rem 1.1rem; font-size: 0.82rem; }
      table { font-size: 0.75rem; }
      th { padding: 0.35rem 0.2rem; font-size: 0.68rem; }
      td { padding: 0.3rem 0.2rem; font-size: 0.75rem; }
      td button { font-size: 0.62rem !important; padding: 0.22rem 0.4rem !important; margin-left: 0.15rem !important; }
      .status-badge { padding: 0.15rem 0.3rem; font-size: 0.62rem; }
    }

    main::-webkit-scrollbar {
      width: 6px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.4) 0%, rgba(6, 182, 212, 0.4) 100%);
      border-radius: 3px;
      box-shadow: 0 0 10px rgba(8, 145, 178, 0.2);
    }

    main::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.6) 0%, rgba(6, 182, 212, 0.6) 100%);
    }
  </style>
</head>
<body>

<main class="layout-main">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <h1>Consentimientos</h1>
      <p>Registro de consentimientos informados de pacientes</p>
    </div>
  </div>

  <!-- Consent Templates Table -->
  <div class="section">
    <h3>
      <span>Plantillas de Consentimientos</span>
      <button onclick="location.href='/consentimientos-crear.html'" class="btn-primary">
        <span>+ Nueva Plantilla</span>
      </button>
    </h3>
    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Título</th>
          <th>Fecha de Creación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="consentsTable">
        <tr><td colspan="4" class="empty-table">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="/icons.js"></script>
<script src="/common.js"></script>
<script src="/layout.js"></script>
<script>
  requireAuth(['clinic_admin', 'doctor']);

  (async () => {
    try {
      const templates = await api('/api/consents/templates');
      const table = document.getElementById('consentsTable');

      if (templates.length === 0) {
        table.innerHTML = '<tr><td colspan="4" class="empty-table">No hay plantillas de consentimientos</td></tr>';
      } else {
        table.innerHTML = templates.map(t => {
          const date = new Date(t.created_at).toLocaleDateString('es-ES', { month: 'short', day: 'numeric', year: 'numeric' });
          return `
            <tr>
              <td>${esc(t.type)}</td>
              <td>${esc(t.title)}</td>
              <td>${date}</td>
              <td>
                <button onclick="editTemplate(${t.id})" style="padding: 0.4rem 0.8rem; background: #f1f5f9; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; color: #0891b2; font-weight: 700;">Editar</button>
                <button onclick="deleteTemplate(${t.id})" style="padding: 0.4rem 0.8rem; background: #fee2e2; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; color: #dc2626; font-weight: 700; margin-left: 0.5rem;">Eliminar</button>
              </td>
            </tr>
          `;
        }).join('');
      }
    } catch(e) {
      console.error(e);
      document.getElementById('consentsTable').innerHTML = '<tr><td colspan="4" class="empty-table">Error al cargar plantillas</td></tr>';
    }
  })();

  function editTemplate(id) {
    location.href = `/consentimientos-crear.html?edit=${id}`;
  }

  async function deleteTemplate(id) {
    if (!confirm('¿Estás seguro de que quieres eliminar esta plantilla?')) return;
    try {
      await api(`/api/consents/templates/${id}`, { method: 'DELETE' });
      location.reload();
    } catch(e) {
      alert('Error al eliminar: ' + e.message);
    }
  }
</script>
</body>
</html>
