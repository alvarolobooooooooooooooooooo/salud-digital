<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaludDigital — Crear Consentimiento</title>
  <link rel="stylesheet" href="/layout.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes floatBg {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(50px) translateX(30px); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #ecf9fc 100%);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(8, 145, 178, 0.12) 0%, transparent 70%);
      top: -200px;
      right: -300px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 20s ease-in-out infinite;
      filter: blur(60px);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      bottom: -200px;
      left: -200px;
      border-radius: 50%;
      z-index: 0;
      animation: floatBg 25s ease-in-out infinite reverse;
      filter: blur(60px);
      pointer-events: none;
    }

    main {
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 2rem;
      position: relative;
      z-index: 1;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      gap: 2rem;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: #f1f5f9;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      color: #0891b2;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .back-button:hover {
      background: #ecf9fc;
      border-color: #0891b2;
    }

    .header-content h1 {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.04em;
    }

    .header-content p {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
      font-weight: 600;
    }

    .form-container {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(240, 249, 255, 0.95) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 100px rgba(8, 145, 178, 0.08), 0 20px 50px rgba(0, 0, 0, 0.08);
      animation: fadeSlideUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      opacity: 0;
    }

    .form-group {
      margin-bottom: 1.75rem;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #0891b2;
      margin-bottom: 0.6rem;
    }

    input[type="text"],
    input[type="hidden"],
    select {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      background: #f8fafc;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #0891b2;
      box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
      background: white;
    }

    .editor-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #0891b2;
      margin-bottom: 0.6rem;
    }

    .ql-container {
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 12px;
      min-height: 400px;
    }

    .ql-editor {
      padding: 1rem;
      min-height: 400px;
    }

    .ql-toolbar {
      border-radius: 12px 12px 0 0;
      border: 1.5px solid #e2e8f0;
      border-bottom: none;
      background: #f8fafc;
    }

    .ql-toolbar.ql-snow {
      padding: 0.75rem;
    }

    .ql-container.ql-snow {
      border: 1.5px solid #e2e8f0;
      border-radius: 0 0 12px 12px;
    }

    .ql-snow .ql-stroke {
      stroke: #cbd5e1;
    }

    .ql-snow .ql-fill,
    .ql-snow .ql-stroke.ql-fill {
      fill: #cbd5e1;
    }

    .ql-snow .ql-picker-label {
      color: #64748b;
    }

    .ql-toolbar.ql-snow .ql-picker-item:selected .ql-selected,
    .ql-toolbar.ql-snow .ql-picker-item:selected .ql-stroke.ql-selected,
    .ql-toolbar.ql-snow .ql-picker-item:selected .ql-fill.ql-selected {
      color: #0891b2;
    }

    .ql-toolbar.ql-snow button:hover,
    .ql-toolbar.ql-snow button:focus,
    .ql-toolbar.ql-snow button.ql-active,
    .ql-toolbar.ql-snow .ql-picker-label:hover,
    .ql-toolbar.ql-snow .ql-picker-item:hover,
    .ql-toolbar.ql-snow .ql-picker-item.ql-selected {
      color: #0891b2;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      justify-content: flex-end;
    }

    .btn {
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      box-shadow: 0 6px 18px rgba(8, 145, 178, 0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.35);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #64748b;
      border: 1.5px solid #e2e8f0;
    }

    .btn-secondary:hover {
      background: #ecf9fc;
      border-color: #0891b2;
      color: #0891b2;
    }

    @media (max-width: 768px) {
      main { padding: 1.5rem 1rem; }
      .header-content h1 { font-size: 1.6rem; }
      .ql-editor { min-height: 250px; }
      .actions { flex-direction: column-reverse; }
      .btn { width: 100%; }
    }

    main::-webkit-scrollbar {
      width: 6px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, rgba(8, 145, 178, 0.4) 0%, rgba(6, 182, 212, 0.4) 100%);
      border-radius: 3px;
    }
  </style>
</head>
<body>

<main class="layout-main">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <h1>Crear Consentimiento</h1>
      <p>Crea un nuevo consentimiento informado para tus pacientes</p>
    </div>
    <button class="back-button" onclick="history.back()" title="Volver">
      <span id="backIcon"></span>
      <span>Volver</span>
    </button>
  </div>

  <!-- Form -->
  <div class="form-container">
    <form id="consentForm">
      <div class="form-group">
        <label for="consentType">Tipo de Plantilla</label>
        <input type="text" id="consentType" placeholder="Ej: Tratamiento, Cirugía, Consentimiento General" required>
      </div>

      <div class="form-group">
        <label for="consentTitle">Título de la Plantilla</label>
        <input type="text" id="consentTitle" placeholder="Ej: Consentimiento para Extracción de Pieza Dental" required>
      </div>

      <div class="form-group">
        <label class="editor-label">Contenido de la Plantilla</label>
        <div id="editor"></div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-secondary" onclick="history.back()">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Crear Plantilla</button>
      </div>
    </form>
  </div>
</main>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="/icons.js"></script>
<script src="/common.js"></script>
<script src="/layout.js"></script>
<script>
  requireAuth(['clinic_admin', 'doctor']);

  // Render back icon
  const backIcon = document.querySelector('#backIcon');
  if (backIcon && typeof Icons !== 'undefined') {
    backIcon.innerHTML = Icons.render('arrowLeft', 16);
  }

  // Initialize Quill editor
  const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'Escribe el contenido del consentimiento aquí...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        ['blockquote', 'code-block'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['link', 'image'],
        ['clean']
      ]
    }
  });

  // Check if editing
  const params = new URLSearchParams(window.location.search);
  const editId = params.get('edit');

  if (editId) {
    document.querySelector('.header-content h1').textContent = 'Editar Plantilla';
    document.querySelector('.header-content p').textContent = 'Modifica una plantilla de consentimiento existente';
    document.getElementById('submitBtn').textContent = 'Actualizar Plantilla';

    (async () => {
      try {
        const template = await api(`/api/consents/templates/${editId}`);
        document.getElementById('consentType').value = template.type;
        document.getElementById('consentTitle').value = template.title;
        quill.root.innerHTML = template.description;
      } catch(e) {
        alert('Error al cargar plantilla: ' + e.message);
      }
    })();
  }

  // Handle form submission
  document.getElementById('consentForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const consentType = document.getElementById('consentType').value.trim();
    const consentTitle = document.getElementById('consentTitle').value.trim();
    const description = quill.root.innerHTML;

    if (!consentType || !consentTitle) {
      alert('Por favor completa todos los campos requeridos');
      return;
    }

    if (!description.trim() || description === '<p><br></p>' || description === '<p></p>') {
      alert('Por favor escribe el contenido de la plantilla');
      return;
    }

    try {
      const data = {
        type: consentType,
        title: consentTitle,
        description: description.trim()
      };

      console.log('Sending data:', data);

      if (editId) {
        await api(`/api/consents/templates/${editId}`, {
          method: 'PUT',
          body: data
        });
        alert('Plantilla actualizada exitosamente');
      } else {
        const result = await api('/api/consents/templates', {
          method: 'POST',
          body: data
        });
        alert('Plantilla creada exitosamente');
      }
      location.href = '/consentimientos.html';
    } catch(e) {
      console.error('Error:', e);
      alert('Error: ' + e.message);
    }
  });
</script>
</body>
</html>
