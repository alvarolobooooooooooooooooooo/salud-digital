<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaludDigital — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0891b2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(8, 145, 178, 0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      bottom: -50px;
      left: -50px;
      border-radius: 50%;
      z-index: 0;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
      gap: 4rem;
      position: relative;
      z-index: 1;
    }

    .hero {
      flex: 1;
      display: none;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      color: white;
      margin-bottom: 1rem;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.8;
      max-width: 500px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2), 0 0 1px rgba(255, 255, 255, 0.5) inset;
      width: 100%;
      max-width: 440px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.25rem;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      font-weight: 500;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #1e293b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      background: #f8fafc;
      color: #0f172a;
    }

    input:hover {
      border-color: #cbd5e1;
      background: #f1f5f9;
    }

    input:focus {
      outline: none;
      border-color: #0891b2;
      background: white;
      box-shadow: 0 0 0 4px rgba(8, 145, 178, 0.12), inset 0 0 0 1px rgba(8, 145, 178, 0.05);
    }

    input::placeholder {
      color: #cbd5e1;
    }

    button {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 0 10px 30px rgba(8, 145, 178, 0.2);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      box-shadow: 0 15px 40px rgba(8, 145, 178, 0.3);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0px);
      box-shadow: 0 8px 20px rgba(8, 145, 178, 0.2);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 1.2em;
      padding: 0.5rem;
      background: rgba(220, 38, 38, 0.05);
      border-radius: 6px;
      border-left: 3px solid #dc2626;
      padding-left: 0.75rem;
    }

    @media (min-width: 768px) {
      .hero {
        display: block;
      }

      .container {
        gap: 5rem;
      }
    }

    @media (max-width: 600px) {
      .card {
        padding: 2.5rem 1.75rem;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .logo {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Bienvenido a SaludDigital</h1>
      <p>Plataforma moderna de gestión clínica diseñada para optimizar el flujo de trabajo de tu clínica. Acceso seguro y eficiente a todos los expedientes de tus pacientes.</p>
    </div>
    <div class="card">
      <div class="logo-wrap" id="logoWrap">
        <div class="logo">SaludDigital</div>
      </div>
      <div class="subtitle">Sistema de gestión clínica</div>
      <form id="loginForm">
        <div class="field">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" required autocomplete="email" placeholder="tu@email.com">
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit">Ingresar</button>
        <div class="error" id="error"></div>
      </form>
    </div>
  </div>

  <script src="/icons.js"></script>
  <script>
    // Renderizar icono del logo
    const logoWrap = document.getElementById('logoWrap');
    const logoIcon = document.createElement('div');
    logoIcon.innerHTML = Icons.render('stethoscope', 20);
    logoIcon.style.color = '#0891b2';
    logoWrap.insertBefore(logoIcon, logoWrap.firstChild);

    if (localStorage.getItem('sd_token')) {
      window.location.href = localStorage.getItem('sd_role') === 'super_admin' ? '/admin.html' : '/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      const btn = e.target.querySelector('button');
      err.textContent = '';

      try {
        btn.disabled = true;
        btn.textContent = 'Ingresando...';

        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.error;
          btn.disabled = false;
          btn.textContent = 'Ingresar';
          return;
        }

        localStorage.setItem('sd_token', data.token);
        localStorage.setItem('sd_role', data.role);
        localStorage.setItem('sd_clinic_id', data.clinic_id);

        if (data.role === 'super_admin') window.location.href = '/admin.html';
        else if (data.role === 'receptionist') window.location.href = '/reception.html';
        else window.location.href = '/dashboard.html';
      } catch {
        err.textContent = 'Error de conexión. Intente nuevamente.';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });
  </script>
</body>
</html>
