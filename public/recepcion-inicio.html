<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SaludDigital — Recepción</title>
  <link rel="stylesheet" href="/layout.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #f0f9ff 0%, #ecfeff 50%, #f0fdfa 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      color: #0f172a;
    }
    main { padding: 2rem; width: 100%; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .greeting h1 {
      font-size: 2.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }
    .greeting p { color: #64748b; font-weight: 600; font-size: 0.95rem; }
    .clock-card {
      background: linear-gradient(135deg, #0891b2, #06b6d4);
      color: white;
      padding: 1.25rem 1.75rem;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(8, 145, 178, 0.25);
      text-align: center;
      min-width: 200px;
    }
    .clock-time {
      font-size: 2rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    .clock-date {
      font-size: 0.8rem;
      opacity: 0.9;
      text-transform: capitalize;
      font-weight: 600;
      margin-top: 0.15rem;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      padding: 1.25rem 1.5rem;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(8, 145, 178, 0.06);
      border: 1px solid rgba(8, 145, 178, 0.08);
    }
    .stat-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 900;
      color: #0f172a;
    }
    .stat-value.green { color: #047857; }
    .stat-value.red { color: #b91c1c; }
    .stat-value.amber { color: #b45309; }

    .layout-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .rooms-section h2, .queue-section h2 {
      font-size: 1.1rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .room {
      position: relative;
      background: white;
      border-radius: 24px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 8px 28px rgba(8, 145, 178, 0.08);
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow: hidden;
    }
    .room::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 6px;
      transition: all 0.3s;
    }
    .room.free::before { background: linear-gradient(90deg, #10b981, #34d399); }
    .room.occupied::before { background: linear-gradient(90deg, #ef4444, #f87171); }
    .room.cleaning::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

    .room.free { border-color: rgba(16, 185, 129, 0.2); }
    .room.free:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(16, 185, 129, 0.2);
      border-color: #10b981;
    }
    .room.occupied { border-color: rgba(239, 68, 68, 0.2); background: linear-gradient(135deg, white 0%, #fef2f2 100%); }
    .room.occupied:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(239, 68, 68, 0.18);
    }

    .room-icon-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 110px;
      position: relative;
    }
    .bed-icon {
      width: 90px;
      height: 90px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .room.free .bed-icon {
      background: radial-gradient(circle, #d1fae5 0%, #a7f3d0 100%);
      animation: breathe 3s ease-in-out infinite;
    }
    .room.occupied .bed-icon {
      background: radial-gradient(circle, #fee2e2 0%, #fca5a5 100%);
    }
    .room.cleaning .bed-icon {
      background: radial-gradient(circle, #fef3c7 0%, #fde68a 100%);
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 0 14px rgba(16, 185, 129, 0); }
    }

    .bed-svg { width: 56px; height: 56px; }
    .room.free .bed-svg { color: #047857; }
    .room.occupied .bed-svg { color: #b91c1c; }
    .room.cleaning .bed-svg { color: #b45309; }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .room-title { font-size: 1.25rem; font-weight: 800; color: #0f172a; }
    .room-badge {
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .room.free .room-badge { background: #d1fae5; color: #047857; }
    .room.occupied .room-badge { background: #fee2e2; color: #b91c1c; }
    .room.cleaning .room-badge { background: #fef3c7; color: #b45309; }

    .room-body {
      text-align: center;
      min-height: 60px;
    }
    .room-empty-msg {
      color: #94a3b8;
      font-style: italic;
      font-size: 0.9rem;
      padding-top: 0.5rem;
    }
    .room-patient { font-weight: 800; font-size: 1rem; color: #0f172a; }
    .room-doctor { font-size: 0.85rem; color: #64748b; margin-top: 0.15rem; }
    .room-timer {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.25rem 0.7rem;
      background: rgba(239, 68, 68, 0.1);
      color: #b91c1c;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
    }

    .queue-section {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 4px 16px rgba(8, 145, 178, 0.06);
      border: 1px solid rgba(8, 145, 178, 0.08);
    }
    .queue-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .queue-card {
      background: linear-gradient(135deg, #f0f9ff, #ecfeff);
      border: 1.5px solid rgba(8, 145, 178, 0.15);
      border-radius: 14px;
      padding: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .queue-card:hover {
      border-color: #0891b2;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(8, 145, 178, 0.15);
    }
    .queue-name { font-weight: 800; font-size: 0.95rem; color: #0f172a; }
    .queue-meta { font-size: 0.8rem; color: #64748b; margin-top: 0.15rem; }
    .queue-wait {
      display: inline-block;
      margin-top: 0.4rem;
      font-size: 0.7rem;
      font-weight: 800;
      color: #b45309;
      background: #fef3c7;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .queue-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: #94a3b8;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* Modals */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1rem;
    }
    .overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 1.75rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
    }
    .modal-title { font-size: 1.25rem; font-weight: 800; color: #0f172a; margin-bottom: 1rem; }
    .modal-list { max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .modal-item {
      padding: 0.85rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-item:hover { border-color: #0891b2; background: #f0f9ff; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
    .btn {
      padding: 0.65rem 1.2rem;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-cancel { background: #f1f5f9; color: #475569; }
    .btn-primary { background: linear-gradient(135deg, #0891b2, #06b6d4); color: white; }
    .btn-danger { background: #ef4444; color: white; }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #0f172a;
      color: white;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      z-index: 9999;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Loading animation */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #f0f9ff 0%, #ecfeff 50%, #f0fdfa 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      gap: 1.5rem;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(8, 145, 178, 0.15);
      border-top-color: #0891b2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: #64748b;
      font-weight: 600;
      font-size: 0.95rem;
    }

    @media (max-width: 1100px) {
      .layout-grid { grid-template-columns: 1fr; }
      .queue-section { position: static; max-height: none; }
    }
    @media (max-width: 720px) {
      main { padding: 1rem; padding-top: 80px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .rooms-grid { grid-template-columns: 1fr; }
      .greeting h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Cargando datos...</div>
</div>

<main class="layout-main">
  <div class="top-bar">
    <div class="greeting">
      <h1 id="greeting">Buenos días</h1>
      <p>Panel de recepción en tiempo real</p>
    </div>
    <div class="clock-card">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate">—</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Atendidos hoy</div>
      <div class="stat-value green" id="statCompleted">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">En espera</div>
      <div class="stat-value amber" id="statWaiting">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">En consulta</div>
      <div class="stat-value red" id="statInProgress">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Espera promedio</div>
      <div class="stat-value" id="statAvgWait">— min</div>
    </div>
  </div>

  <div class="layout-grid">
    <div class="rooms-section">
      <h2>Habitaciones</h2>
      <div class="rooms-grid" id="roomsGrid">
        <div style="padding:2rem;color:#94a3b8;">Cargando habitaciones...</div>
      </div>
    </div>

    <div class="queue-section">
      <h2>Cola de espera</h2>
      <div class="queue-list" id="queueList">
        <div class="queue-empty">Cargando...</div>
      </div>
    </div>
  </div>
</main>

<!-- Modal: Asignar paciente a habitación -->
<div class="overlay" id="assignOverlay" onclick="closeAssign()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Asignar paciente a <span id="assignRoomName"></span></div>
    <div class="modal-list" id="assignList"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeAssign()">Cerrar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalles de habitación ocupada -->
<div class="overlay" id="detailOverlay" onclick="closeDetail()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Habitación ocupada</div>
    <div id="detailBody" style="margin-bottom:1rem;color:#475569;"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeDetail()">Cerrar</button>
      <button class="btn btn-danger" onclick="releaseRoom()">Liberar habitación</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/icons.js"></script>
<script src="/common.js"></script>
<script src="/layout.js"></script>
<script>
  requireAuth(['receptionist', 'clinic_admin']);

  let rooms = [];
  let queue = [];
  let pendingAppointments = [];
  let activeRoomForAssign = null;
  let activeRoomForDetail = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  const bedSVG = `<svg class="bed-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>`;

  function tickClock() {
    const now = new Date();
    document.getElementById('clockTime').textContent =
      now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('clockDate').textContent =
      now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    const h = now.getHours();
    document.getElementById('greeting').textContent =
      h < 12 ? '☀️ Buenos días' : h < 19 ? '🌤️ Buenas tardes' : '🌙 Buenas noches';
  }

  function timeSince(ts) {
    if (!ts) return '';
    const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
    if (diff < 0) return '0 min';
    if (diff < 60) return `${diff} min`;
    const h = Math.floor(diff / 60); const m = diff % 60;
    return `${h}h ${m}m`;
  }

  async function loadAll() {
    try {
      const [r, q, s, p] = await Promise.all([
        api('/api/rooms'),
        api('/api/reception/waiting-queue'),
        api('/api/reception/stats-today'),
        api('/api/reception/today-appointments')
      ]);
      rooms = r;
      queue = q;
      pendingAppointments = p.filter(a => !['completed', 'cancelled'].includes(a.status) && !a.checked_in_at);
      renderRooms();
      renderQueue();
      renderStats(s);
      document.getElementById('loadingOverlay').classList.add('hidden');
    } catch (e) {
      console.error(e);
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  }

  function renderStats(s) {
    document.getElementById('statCompleted').textContent = s.completed || 0;
    document.getElementById('statWaiting').textContent = s.waiting || 0;
    document.getElementById('statInProgress').textContent = s.in_progress || 0;
    document.getElementById('statAvgWait').textContent =
      s.avg_wait_min ? `${Math.round(s.avg_wait_min)} min` : '— min';
  }

  function renderRooms() {
    const grid = document.getElementById('roomsGrid');
    if (rooms.length === 0) {
      grid.innerHTML = '<div style="padding:2rem;color:#94a3b8;text-align:center;">No hay habitaciones configuradas. Pide al administrador que las cree.</div>';
      return;
    }
    const labels = { free: 'Libre', occupied: 'Ocupada', cleaning: 'Limpieza' };
    grid.innerHTML = rooms.map(r => `
      <div class="room ${r.status}" onclick="onRoomClick(${r.id})">
        <div class="room-header">
          <div class="room-title">${esc(r.name)}</div>
          <div class="room-badge">${labels[r.status] || r.status}</div>
        </div>
        <div class="room-icon-wrap">
          <div class="bed-icon">${bedSVG}</div>
        </div>
        <div class="room-body">
          ${r.status === 'free'
            ? '<div class="room-empty-msg">Toca para asignar</div>'
            : r.patient_name
              ? `<div class="room-patient">${esc(r.patient_name)}</div>
                 <div class="room-doctor">con ${esc(r.doctor_name || '—')}</div>
                 ${r.occupied_since ? `<div class="room-timer">⏱ ${timeSince(r.occupied_since)}</div>` : ''}`
              : '<div class="room-empty-msg">Ocupada</div>'}
        </div>
      </div>
    `).join('');
  }

  function renderQueue() {
    const list = document.getElementById('queueList');
    if (queue.length === 0) {
      list.innerHTML = '<div class="queue-empty">Sin pacientes en espera</div>';
      return;
    }
    list.innerHTML = queue.map(q => `
      <div class="queue-card" onclick="quickAssign(${q.id})">
        <div class="queue-name">${esc(q.patient_name)}</div>
        <div class="queue-meta">${esc(q.doctor_name)} · ${esc(q.specialty || 'Consulta')}</div>
        ${q.checked_in_at ? `<div class="queue-wait">Espera: ${timeSince(q.checked_in_at)}</div>` : ''}
      </div>
    `).join('');
  }

  function onRoomClick(roomId) {
    const room = rooms.find(r => r.id === roomId);
    if (!room) return;
    if (room.status === 'free') openAssign(room);
    else openDetail(room);
  }

  function openAssign(room) {
    activeRoomForAssign = room;
    document.getElementById('assignRoomName').textContent = room.name;
    const list = document.getElementById('assignList');
    if (queue.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:1rem;font-style:italic;">No hay pacientes en cola. Haz check-in desde "Citas Hoy" primero.</div>';
    } else {
      list.innerHTML = queue.map(q => `
        <div class="modal-item" onclick="confirmAssign(${q.id})">
          <div style="font-weight:800;">${esc(q.patient_name)}</div>
          <div style="font-size:0.85rem;color:#64748b;">${esc(q.doctor_name)} · ${esc(q.specialty || 'Consulta')}</div>
        </div>
      `).join('');
    }
    document.getElementById('assignOverlay').classList.add('active');
  }

  function closeAssign() {
    document.getElementById('assignOverlay').classList.remove('active');
    activeRoomForAssign = null;
  }

  async function confirmAssign(appointmentId) {
    if (!activeRoomForAssign) return;
    try {
      await api(`/api/rooms/${activeRoomForAssign.id}/assign`, {
        method: 'POST',
        body: { appointment_id: appointmentId }
      });
      showToast('Paciente asignado');
      closeAssign();
      loadAll();
    } catch (e) {
      showToast('Error: ' + e.message);
    }
  }

  async function quickAssign(appointmentId) {
    const free = rooms.find(r => r.status === 'free');
    if (!free) { showToast('No hay habitaciones libres'); return; }
    try {
      await api(`/api/rooms/${free.id}/assign`, {
        method: 'POST',
        body: { appointment_id: appointmentId }
      });
      showToast(`Asignado a ${free.name}`);
      loadAll();
    } catch (e) {
      showToast('Error: ' + e.message);
    }
  }

  function openDetail(room) {
    activeRoomForDetail = room;
    const since = room.occupied_since ? timeSince(room.occupied_since) : '—';
    document.getElementById('detailBody').innerHTML = `
      <div><strong>Sala:</strong> ${esc(room.name)}</div>
      <div><strong>Paciente:</strong> ${esc(room.patient_name || '—')}</div>
      <div><strong>Doctor:</strong> ${esc(room.doctor_name || '—')}</div>
      <div><strong>En sala desde:</strong> ${since}</div>
    `;
    document.getElementById('detailOverlay').classList.add('active');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('active');
    activeRoomForDetail = null;
  }

  async function releaseRoom() {
    if (!activeRoomForDetail) return;
    if (!confirm('¿Marcar consulta como terminada y liberar habitación?')) return;
    try {
      await api(`/api/rooms/${activeRoomForDetail.id}/release`, { method: 'POST' });
      showToast('Habitación liberada');
      closeDetail();
      loadAll();
    } catch (e) {
      showToast('Error: ' + e.message);
    }
  }

  tickClock();
  setInterval(tickClock, 1000);
  loadAll();
  setInterval(loadAll, 5000);
</script>
</body>
</html>
